body:
  text: 唐天竺三藏法師大廣智不空奉詔譯清東鼎湖山菩提心沙門弘贊會釋次誦讚歎阿嚩𠶒囉左覩囉娜二合舍引囉䭾二合娑麼二合囉哩補句致鉢囉二合拏麼跛娜尾呬帝阿者禮怛𪘨娑哩素你祖禮悉𠆙思準泥薩囉二合悶底南引婆嚩捨麼你娑嚩二合引罕引帝薩鉢囉二合拏吠怛你也二合佗引訖灑二合囉引拏蘖帝阿尾你多薩怛嚩二合娜麼你鉢囉二合枲引那路引迦怛囉二合野引囉佗二合迦唎囉訖多二合引囉尾孕二合引那戍引鼻你播引怛囉二合迦囉那訖使二合𩕳娑普二合砧底浪切悉體二合怛嚩二合進底多麼囉貪二合去鉢囉二合瑟砧二合李佉惹曩你爾娜引你薩帝知曳切曩鉢囉二合庫舞二合地曬邏始佉嚟野薩怛梵二合引囉抳焰二合惹閉怛母二合你帽引你你夷切嚩日哩二合擔枳邏䭾彌焰二合素囉哩補婆嚩喃鉢囉二合吠奢野底阿引哩野二合嚩路引枳帝皤悉𠆙底諾僧捨閻薩怛多惹播引多半音多語切旦曩引悉底二合惹㜸底緊旨你也二合薩怛梵三合引曩那娜引悉薄羯底二合毗藥二合壹底娑迦羅播引跛曩引舍你婆誐嚩底跛耻多麼引怛囉二合悉地迦哩布囉野麼努引囉貪冥枲引娜底曩怛梵二合引娑麼二合囕迦室子二合多半音婆誐嚩底準泥陀引囉尼薩妬二合怛羅二合薩麼跛多二合讚歎者謂稱揚讚歎聖德之美具足無邊福智能成就眾生所求一切世出世間之樂然智譯缺此讚法持明藏中雖備其文尤繁行者若不能作此梵讚當知蘇悉地經讚偈蘇悉地經云其讚歎文應用諸佛菩薩所說歎偈不應自作而彼經無讚準提文今按本經述一偈以讚本尊偈曰大慈救世尊善導一切眾福持功德海我今稽首禮真如舍摩法能淨貪瞋毒善除諸惡趣我今稽首禮得法解脫僧善住諸學地勝上福德因我今稽首禮大聖準提尊哀愍於世間成就諸悉地我今稽首禮大悲觀自在一切佛讚歎能生種種福我今稽首禮大力忿怒身善哉持明王降伏難伏者我今稽首禮忿怒身即明王大威金剛次說本尊陀羅尼布字法從頂至足觀一一真言字屈曲分明流出光明照六道四生輪迴有情深起悲愍施與安樂用陀羅尼九字布列於行者身即成以如來印八大菩薩所加持身若作息災增益降伏敬愛隨四種法所謂白黃黑赤成辦悉地即結布字印二手內相叉二大指二頭指二小指相合直豎即成智譯云結此手契成即想自身猶若釋迦如來三十二相八十種好紫磨金色圓滿身光想已以手契觸頭上布唵字觸眼中布折字一一依字次第乃至兩足皆以契觸布之想唵字安於頂以大拇指觸頭上次想左字即者字兩目瞳人上俱想禮字復以大拇指觸左右眼上次想祖字即主字安於頸上用大拇指觸次想禮字當心以大拇指觸次想準字安左右肩以大拇指觸次想泥字安上以大拇指觸次想娑嚩二合字安右左兩䏶上以小指觸次想訶字安右左兩脛上以小指觸智譯每字皆以偈釋及令觀字色相然其安布與本譯略有參差故不錄如欲知者下持誦法要當出又當知令想九字真言皆是天竺梵書非此方之文故一字頂輪王儀軌云所言觀諸字唯瞻於梵書非是隨方文有大神力用或問曰何以梵字皆有不思議神用耶答曰謂每一一字當體即是諸佛菩薩心故當體即是離相法界故當體即是教理行果故是以有不可思議神用也又天竺梵字法爾本有何以故以世界初成時梵王傳說不同此方蒼頡等創製若然者凡天竺梵字皆有不思議神用何得偏贊真言中字耶答曰以真言中字由諸佛不思議神力加持體含多義法性如然故偏有神用即如此方語言文字是一唯急急如律令等語呪火不燒呪湯不熱呪刀不傷呪毒不中由作呪語偏有此神用非餘一切文言皆有此功力天竺亦爾文字雖一唯真言中字偏有神力非餘一切字皆有如是神用也或曰呪是諸佛秘密之法尚非因位所知何以今解釋此九聖字義答曰據賢首心經疏及神變疏并密藏諸經釋陀羅尼字意而有二門一不可說門謂呪是諸佛密法唯佛與佛相傳不通他解但當持誦不須強釋二強說門謂真言中隨舉一字或作人或作法橫豎該羅自在解脫以要言之無盡法門於一字中解說都盡方是陀羅尼字義就此而言假使十方諸佛經恒沙劫共說真言中一字義亦不能盡故莊嚴寶王經云六字陀羅尼是觀自在菩薩微妙本心無量如來而尚難知其因位菩薩云何而能解耶是知知者尚難況其受者今於一字中略為解釋即是強說門中少分一途義耳謂於真言一字中或作二義五義十義乃至百義等解釋名為少分義若作一義解釋名為一途義上云尚非因位能解者此據密教圓宗不可說門而言也其不可說門義當密教圓宗離言果海其強說門義當顯教圓宗帶言因分也由想布真言結印加持故行者身即成準泥佛母身滅除一切業障積集無量福德吉祥其身成金剛不壞體若能常專注觀行一切悉地皆得現前速證無上正等菩提智譯云如是布字想念已便成準提勝法門亦名本尊真實相能滅諸罪得吉祥猶如金剛堅固聚是名準提勝上法若常如是修行者當知是人速悉地故持明藏儀軌經云若於準提菩薩法中求成就者先觀準提菩薩根本微妙字輪安自身分一一分明是人先身所造一切罪業悉得除滅凡有所求決定成就神變疏云真言行者能令三業即同本尊三業又真言中每一一字皆是諸佛全身故云行者身即成準泥佛母身故知此準提神呪體即法身圓圓果海用即不可思議所以得速證無上菩提次結根本印如前閼伽印出持明藏經云行人結根本印誦根本真言時本尊菩薩歡喜顧視行人誦根本真言七遍頂上散印智譯用第二根本印誦根本真言即取菩提子念珠具一百八依法貫穿即以塗香塗其珠上以二手掌中捧珠當心誦真言七遍加持念珠蘇悉地經云捧數珠時微小低頭以至誠心頂禮三寶諸佛菩薩若作阿毗遮嚕迦法應用諸首而作數珠速成就故真言曰唵吠嚧引遮那引麼羅娑嚩二合引賀引此是持珠真言吠字無蓋切智譯作微字於麼字上有阿字餘悉同吠嚧遮那此云徧照亦云大日如世間日唯照晝不照夜照一世界不照餘世界不得名大日如來色身法身普周法界十方世界悉皆照耀若人稱名皈依禮拜則得法界一切諸佛菩薩賢聖乃至八部加持衛護加持頂戴心口作是願言我今欲念誦惟願本尊諸佛菩薩加持護念願令速得隨意所求悉地圓滿然後以左手無名指大指承珠右手以大指無名指移珠手如說法相先以珠加持頂載後方結此持珠印有云右手大指捻無名指頭直舒中指小指微屈以頭指著中指上節側此是佛部執數珠印智譯云二手相去一寸許餘指散開微屈當於心前持珠念誦其聲不緩不急此名言音持誦根本真言智譯云不得高聲須分明稱字而令自聞此名聲念一字佛頂輪王念誦儀軌云字句分明呼不緩亦不急不頻伸噦嗌咳𠻳與唾涕染等心相應及與緣苦受如是等過患皆不得成就心專注不異緣觀自身同本尊身相好具足又於身前壇中觀想七俱胝佛母與眷屬圍繞了了分明對坐智譯云所觀本尊及身上布字念誦記數於一念中並須一時觀見不得有缺使心散亂蘇悉地經云念誦之時不作異語想真言如對目前如是傾誠不應散亂心緣別境身雖疲極不縱放之制諸惡氣世間談話皆不思念不捨本尊縱見奇相而不恠之每稱娑嚩二合引賀字同時移一珠智譯云誦本尊陀羅尼一遍以右手無名指捻一珠過周而復始一百八或一千八十為念誦遍數常須限定若不滿一百八即不克求悉地遍數蘇悉地經云依法念誦了應起誠心作祈請云我依本法念誦數滿唯願尊者領受為證於其夢中為授教誨正念誦時若有謦欬昏𤞑欠呿忌真言字即起就水作洗淨法已還從前念被所障隔為須一一皆從始念掐珠將畢時申禮一拜終而復始數珠一帀一覩本尊顏而作一禮若正念誦時忽然錯誤當誠心懺悔過由放逸故致斯誤願尊捨過便申頂禮復須從始而念誦之念誦畢已蟠珠於掌中頂戴發願作是願言以我念誦功德一切眾生所修真行求上中下悉地速得成就安珠於篋中言上中下悉地者每地各有三品共成九品下三品者若下品成就能攝伏一切四眾凡有所求舉意從心一切天龍而來問訊又能伏一切蟲獸及鬼魅等若中品成就能驅使一切天龍八部能開一切伏藏或要入阿修羅宮龍宮便得入之去住隨心若上品成就便得仙道乘空往來天上天下而得自在世出世間事無不通達中三品者若下品成就便得諸呪仙中為王住壽無數歲福德智慧三界無比若中品成就便得神通往餘世界為轉輪王住壽一劫若上品成就現證初地已上菩薩之位上三品者若下品成就得至五地已上菩薩之位若中品成就得至八地已上菩薩之位若上品成就三密變成三身只於此生得證無上菩提之果此是持呪人九品成就若直求成佛不須求中下三品等即當求上三品成就餘如下增益法明即結定印端身閉目澄心靜意當於胸臆身內炳現圓明如滿月皎潔光明起大精進決定取證若能不懈怠專功必當得見本源清淨之心於圓明中想唵字餘八字右旋於圓明上布列於定中須見真言字分明既不散動得定即與般若波羅蜜相應即畫圓明月輪即結定印者以兩手外相叉仰於臍下或以二手仰掌展舒將右手在左手上二大拇指甲相拄安於臍輪下又無量壽儀軌云以二手外相叉二頭指背相著從中節以上直豎二大指捻二頭指即成此之三印隨結其一皆得作此圓明觀法名為瑜伽念誦故智譯云若求解脫速出離生死作此三摩地瑜伽觀行無記無數念者即想自心如滿月湛然清淨內外分明以唵字安月心中以折隷主隷準提莎嚩訶字從前右旋次第周布輪緣諦觀一一字義與心相應不得差互圓明布列梵書圖持明藏儀軌云唵字為毗盧遮那佛根本左字為大輪明王根本隷字為大忿怒不動尊明王根本又為馬頭明王根本祖字為四臂佛身根本隷字為不空羂索菩薩根本亦觀自在菩薩根本尊字為大尊那菩薩根本禰字為金剛薩埵菩薩根本莎字為伊迦惹吒菩薩根本賀字為嚩日囉曩佉明王根本次應思惟字母種子義此九聖字能生一切字故云字母言種子者是引生義攝持義以初一字為種子而下諸字所有觀智依所引生攝入初字若得唵字門秘密相應即得諸佛無盡法藏則悟一切法本不生一以普及為言切以盡際為語由悟一切法本不生即達諸法空以諸法入實相中故不生不滅乃至悟一切法言語道斷故無言說法相平等如霔大雨故云平等於一一字專注思惟觀察則一切行願皆得滿足唵字者是三身義亦是一切法本不生義智譯云唵字門者是流注不生不滅義復於一切法為最勝義左字者一切法不生不滅義智譯云於一切法是無行義禮字者一切法相無所得義祖字者一切法無生滅義智譯云於一切法是無起住義禮字者一切法無垢義準字者一切法無等覺義泥字者一切法無取捨義娑嚩字者一切法平等無言說義訶字者一切法無因義於一切法是無因寂靜無住涅槃義由一切法本不生故即得不生不滅由不生不滅故即得相無所得由相無所得故即得無生滅由無生滅故即得無垢由無垢故即得無等覺由無等覺故即得無取捨由無取捨故即得平等無言說由平等無言說故即得無因無果般若相應無所得以為方便入勝義實則證法界真如以此為三摩地念誦畢已謂由悟一切法本不生故平等無二成無分別智與般若波羅蜜無智無得相應由此無所得智以為方便悟入最勝義諦證法界真如此法界真如海不可以言詮是佛境界自覺聖智所證非思量分別所能知智譯云所說文字義雖立文字皆是無文字義既無文字須諦觀一一義相週而復始無記無數不得斷絕不斷絕者為流注不生不滅最勝義是故無行為無行義乃至云無因寂靜無住涅槃為無因寂靜無住涅槃義是故不生不滅最勝無斷週而復始此名三摩地念誦按諸陀羅尼經持誦法亦有多種今略出其六一三摩地持亦名瑜伽持但想心月中布字如本經布字法所明二出入息持即於出入息中想有梵書真言字若息出字出若息入字入字字分明朗如貫明珠不得間斷如息出時想自心月輪中九聖梵字字字連環皆有五色光明從自口中流入準提菩薩口中右旋安布菩薩心月輪內如息入時想菩薩心月輪中字字字連環皆有五色光明從菩薩口出流入自口中右旋安布心月輪內如是終而復始想之三金剛持急口齒舌不至㗁但口中微動四言音持亦名微聲持但令自耳聞之不緩不急字字分明稱之五高聲持令他聞之滅罪此須觀時若有不信者在傍聞聲反生毀謗便獲重罪只宜微聲持之六降魔持內以悲心為本外現威怒之相顰眉厲聲念之如後阿毗遮嚕迦法是也復有二種持誦一無數持誦謂不持珠定數常無間斷念之二有相持誦謂掐數珠每日須得限定其數不得闕少於上八種持誦隨用其一依法念誦無有間斷所祈勝果決定成就準金剛智所譯本亦出多種持誦故智譯本次說準提求願觀想法云若求無分別者當觀無分別無記念若求無相無色當觀文字無文字念若求不二法門者應觀兩臂若求四無量當觀四臂若求六神通者當觀六臂若求八聖道當觀八臂若求十波羅蜜圓滿十地者應觀十臂若求如來普遍廣地者應觀十二臂若求十八不共法者應觀十八臂即如畵像法觀也若求三十二相當觀三十二臂若求八萬四千法門者應觀八十四臂如上觀念當入一切如來三摩地門甚深方廣不可思議地是正念處是正真如正解脫念誦觀行了欲出道場復須依前次第更結燒香燈明飲食等手契供養懺悔隨喜發願即結前第一根本印誦根本陀羅尼七遍頂上散之復結前輅車印云云應結根本印次結澡浴印次結五供養印次誦讚歎獻閼伽次結阿三摩擬你二合印左轉一帀解界謂結前火院印誦阿三摩擬你真言左轉一帀解前所結諸界持明藏儀軌經云復作供養讚歎懺謝某甲上來供養絕無殊妙唯願菩薩布施歡喜又獻閼伽而作頂禮作法畢已發遣賢聖復作護身次作阿三摩擬你印次結寶車輅印此中諸印準前應結輅車者乃大車之總名此方黃帝始制天子所乘法車名曰玉輅今寶輅是佛母所乘上有幰葢垂諸華纓四面懸鈴周帀欄楯七寶間錯種種嚴飾以大拇指向外撥中指頭奉送聖者還本宮準智譯以二大拇指向外三度撥二中指頭誦真言三遍奉送真言曰唵者禮主禮準泥蘖車蘖車婆誐嚩底婆嚩二合引婆引嚩南布娜囉引誐麼那引野娑嚩二合引賀引車字當書何切蘖車蘖車即奉送句前請輅車羯哩洒耶即迎請句次結三部三麼耶印各誦真言一遍禮佛如前懺悔隨喜勸請發願廻向無上菩提隨意經行轉讀大乘經典華嚴大般若等經印塔像浴舍利右旋繞思六念以此福聚迴向自所求悉地智譯云誦大般若或華嚴或無邊門或法華楞伽涅槃大經論等思惟講說或以七俱胝佛像塔印用印香泥沙上紙上隨意印之多少如念誦有功如經所說境界一一分明了知次第蘇悉地經云為淨心故常持六念心注一境而不散亂一念佛二念法三念僧四念施五念戒六念天前三是念他後三是念自以施戒是自因天是自果而果有近遠近是生天遠是第一義天又前三亦可為念自謂念一體三寶也優婆塞戒經云念佛法僧名智慧莊嚴念施戒天名福德莊嚴然上所修為欲速得圓滿福智及十波羅蜜頓出世間超三無數劫現生祈尅聖果故須發菩提願運大悲心常欲利樂一切有情同於準提菩薩復仗無邊諸佛菩薩以大悲願加持護助使速成就準此必須依前選擇勝處為所修壇場限四月四日為一期屏絕往來言語方得三密相應面向東方吉祥之位或復餘方若不能依上如法結壇者別有一法亦須擇一靜處於準提聖像前置一淨鏡為壇如上向方跏趺對於聖像行者先於自頂上想一㘕字變成三角火輪從頂至足燒盡自己有漏之身及燒此有為世界如同劫火燒盡無遺但有空寂而已又想一暗字在自頂門中此字體即是諸佛光明法水用灌佛子之頂此是秘密灌頂法門也復想建立無為之壇於最下方遍想欠字雜色而為空輪於空輪上遍想含字黑色變成風輪風輪上遍想㘕字赤色變成火輪火輪上遍想𮢥字白色變成水輪水輪上遍想阿字黃色變成金剛地於金剛地上遍想有大蓮華一一華上皆有準提菩薩飲食幢旛等諸供養具而為供養皆對準提鏡壇三密相應又行者無準提像并華果飲食等供具但作此觀亦得吉祥成就如是想已一心諦觀準提菩薩具無盡相好光明於菩薩心月輪中有九聖字右旋布列行者想自心月輪中亦有九字如前布列於自身分從頂至足亦布九字次誦唵㘕淨法界真言并唵齒𡄦護身真言各二十一遍然後結根本印或金剛拳誦準提真言無記無數專精一意勤策身心不令懈怠欲近成就時或有種種障起應如後作息災等法而降伏之於一期中隨自根性必獲三昧現前即於定中見無數佛會聞妙法音證得十地菩薩之位行者欲於此法求成就者須依前預誦準提真言一萬遍乃至十萬遍而為先行如蘇悉地經云若不先誦遍滿念持所求下法尚不得成就況求上中悉地成就以是義故作勝上心而先念誦既為先行便於夢中見諸佛菩薩吐出黑物等即是罪滅福生成就之相如念所求決獲果遂莫生疑惑之心勿起取捨之念更須策發三業加功誦持亦不得以是境界衒賣於人唯同道者不為名利敬讚方得說之或曰見如上相得無成邪妄耶曰今依經持誦正觀成就勝境自現非同他修斥離取相如不達經各有旨雷同取謗毀滅大乘自陷泥犁然行者若欲持誦真言必須求於明師善曉梵音作法之者指決字句契印不令訛謬切勿師心持誦無騐於呪生疑自招愆咎蘇悉地經云若復有人久至持誦下品真言縱自無力於本尊邊轉求上品自成若於上品真言之中心懷猶預念持供養復不精誠雖於上品真言彼念誦心輕致招下品成就故知持誦皆由心意誠心念誦皆獲悉地若人持誦真言久無效驗不可棄捨倍增廣願轉加精進以成為限如此之人速得成就於其夢中或於虗空有聲告言汝不應持是真言法亦不應棄復不瞋彼何以故並是魔故唯須精進不應退轉心不惡思攀緣諸境縱放諸根恒常獲淨而念誦之故香王陀羅尼經云日別濾水香湯洗浴別著衣裳大小行來皆須洗淨入壇之時須嚼楊枝然後入壇一心誦呪莫思外事持呪之法不得破戒身亦不得近觸著女人若觸著者即無騐次說息災增益敬愛調伏四種法扇底迦法者求滅罪轉障除災害鬼魅疾病囚閉枷鎖疫病國難水旱不調蟲損苗稼五星陵逼本命悉皆除滅煩惱解脫是名息災法扇底迦義譯為息災復含上多義故存梵音而不直翻華言下三法準此應知作此法時著白衣面向北交脛豎膝吉祥坐觀本尊白色供養飲食果子香華燈燭地等悉皆白色交脚豎膝名為吉祥坐塗香用白擅燒香用沉水燈用酥然如無酥用白茶油本譯云觀作白色智譯云並用白色下三法亦然從月一日至八日日三時念誦夜作護摩息災真言曰唵者禮主禮準泥令某甲若為他念誦當稱彼名扇引底矩嚕二合娑嚩二合引賀引智譯云欲作扇底迦等種種方法或為自身或為他人即任依法而作念誦若欲求息災除一切鬼神及聰明長命求解脫者即於道場中面向北交脚豎膝而坐乃至日三時念誦及護摩等法若念誦時先誦根本陀羅尼三七遍已然後但從唵字誦之妙言曰唵折隷主隷準提與彼某甲除災難莎嚩訶作此法時並須於道場壇中如無場壇或於準提像前安置鏡壇更須想一白色圓壇於圓壇中遍想嚩字或𮢥字尊像供具并自身想在圓壇中或於像前只塗一圓壇亦得以慈心相應從月一日初夜起至月八日每日三時洗浴三時換衣至日滿時或斷食或食三白食謂乳酪粳米飯布瑟置二合迦法者求延命官榮伏藏富饒聰慧聞持不忘藥法成就金剛杵等成就或作師子象馬類以真言加持三相現隨上中下所求獲果如蘇悉地經廣說欲求持明仙入阿蘇羅窟及諸八部鬼神窟求入者皆得及證地位神通求二種資糧圓滿速成無上菩提是名增益法作此法時身著黃衣面向東結跏趺坐觀本尊黃色所供養香華飲食果子燈燭地等並皆黃色塗香用黃檀或白檀加少金燒香用白檀然麻油燈從月八日至十五日日三時念誦夜作護摩真言曰唵者禮主禮準泥令某甲布瑟徵二合矩嚕二合娑嚩二合引賀引徵音紙智譯云若欲求增長五通轉輪種種寶藏布著輪劍賢瓶如意寶安善那虞里迦鐘及鉞斧羂索三叉等一切財寶藥草求成就者身著黃衣乃至念誦如前妙言曰唵折隷主隷準提與彼某甲所求如意莎嚩訶如無壇場可於準提像前安置鏡壇更想一黃色方壇於方壇中遍想阿字或暗字尊像供具自身俱想在方壇中或像前塗一方壇亦得以喜悅心相應如前洗浴換衣至日滿時亦如前斷食等三相現者謂火𦦨烟出煖氣若真言行人欲求成就時按諸陀羅尼經用四種物一者弓箭鉞斧鈎輪杵鏡或數珠瓶鉢袈裟等僧家所用種種之物二者雄黃雌黃等種種藥物三者取河岸上土埿作師子象馬牛駝或雞鵝孔金翅鳥等種種禽獸之形四者或塑畫彫刻種種佛菩薩明王等形像隨心所樂用作一事依法成已而置壇中如法誦呪若得火𦦨出時或手執或塗身或乘之與助伴知識飛騰虗空或有人見成就者或成就者見彼人等總得騰空遊諸世界供養諸佛菩薩皆壽命一劫獲初地百法明門若烟出時依前用之得諸仙中為王住壽萬萬歲若煖氣出時得一切人天敬愛所求如意此是成就三種相現若得火光出是上品成就相得烟出是中品成就相得煖氣出是下品成就相西方昔有一人得上品成就引五百人升空又云若火光現得一切呪神常來擁護八部之眾皆常恭敬一切神呪用之皆得最勝靈騐若烟相現隨所去處而無障難所求遂心若煖氣現得一切諸人并鬼神等同心敬愛蘇悉地經云若欲成就藥物等者有三種成光𦦨為上烟氣為中煖氣為下若乘空自在而進此為最上藏形隱跡為中成就世間諸事為下三種成就隨上中下更分別之上成就法得持明仙乘空遊行成就五通或得諸漏斷盡或得辟支佛地或證菩薩地位或知解一切事或辯才多聞或成吠跢羅尸或成藥叉尼或得真陀羅尼或得無盡伏藏具上等事名上中下成就之法若藏跡於身得大勢力先來懈怠而得精勤入修羅宮得長壽藥成鉢史迦天使或能使鬼或能成就娑羅坌爾迦樹神或成多聞悟深義理或合藥或纔塗足頂即遠所涉無有疲乏如上所說悉名中成就之法若下成就法令眾喜見或攝伏眾人或能懲罰惡人降諸怨眾及餘下事名下中下成就之法若見㡧像舍利塔等忽然搖動或光焰出當知不久速得成就餘如上念誦法中上中下九品法明若欲成就輪仙法者鑌鐵作輪量圓兩指一磔輪安六輻輞椽銛利若欲成就雌黃法者取光雌黃如日初出色光亦如融金色光是為上好若欲成就刀法者取好鑌鐵刀量長兩肘以小指齊濶四指無諸瑕病其色紺青如枿施鳥𣭔若欲成就佛頂法者當以金作佛頂猶如畵印安置臺上其臺撑用薩頗胝迦寶若欲成就蓮華法者金作八葉蓮華如兩指一磔手量或用銀作或熟銅白檀木作若欲成就拔折羅法者以好鑌鐵作拔折羅長十六指兩頭各作三股或紫檀金銀熟銅作若欲成就雄黃法者取雄黃色如融金塊成分折復上有光如是雄黃能成上事若欲成就牛黃法者當取黃牛牛黃為上若欲成就護身線法者取細白氎縷三合為股復三股合索童女右撚合或縷金合若欲成就牛糞者取蘭若處淨牛糞燒作灰和龍腦香用若欲成就弓箭槍矟獨股叉棓及諸器杖隨世用者如意而作若欲成就鞍馬車乘牛羊一切鳥獸諸餘物等隨世人共將為上隨意樂作所成就物置於金銀器或熟銅螺盃石木土器等或敷有乳葉香葉蓮葉蕉葉或新氎隨取敷之又葉五重先敷地上置成就物復以五重葉而覆其物或可是散或種種衣或諸雜物次第應知所盛之器然後以不散亂心作三簸多法以心光明其物及散洒之手執杓緩𢍶其酥置其物上誦本真言至莎嚩字即瀉爐中至訶字還觸其物却至酥器如是去來三處觸物不得斷絕是名三簸多護摩法三簸多時以杓遍霑其物皆令潤膩初置物時先以水洒次按持誦若成有情之物作其形像杓次於頂而作護摩若欲成自身以杓觸自頂若為他作但稱其名其護摩物復有三種差別一但稱名二以物葢隔之三但露現眼所觀見如是皆用其酥而作護摩若不得酥當用牛乳或酥和乳或用三甜或觀成就差別應當用之或以真言持誦香水而洒其物如前光顯物法此亦如是又蘇悉地供養法云真言中有唵字者及歸命字應寂心誦若作息災增益之事應小聲念誦若真言有𤙖字及泮吒字應嗔猛誦言二種資糧者謂菩薩欲證佛果必須廣修福智二法以為資糧福智圓滿方證佛果菩提今持真言行人不假餘修但依法念誦即得圓滿速成無上菩提伐施迦囉拏法者若欲令一切人見者發歡喜心攝伏鈎召若男若女天龍八部藥叉女及攝伏難調伏鬼神有諸怨敵作不饒益事皆令迴心歡喜諸佛護念加持是名攝召敬愛法作此法者身著赤衣面向西豎二膝並脚名為賢坐坐法略有三種一結跏坐二半跏坐三記賢坐令身端直勿使動搖而作念誦觀本尊及所供養香華飲食果子燈燭地等並皆赤色塗香用金燒香以丁香蘇合和蜜燒之然諸果油燈從十六日至二十三日每日三時念誦夜作護摩攝召真言曰唵者禮主禮準泥令某甲嚩試矩嚕二合婆嚩二合引賀引智譯云若欲呼召一切天龍鬼神人非人等應作此法乃至妙言曰唵折隷主隷準提為彼攝召某神成就我願莎嚩訶如無壇場可於準提像前安置鏡壇更想一赤色半月形壇於半月壇中遍想賀字或含字尊像供具自身俱想在半月壇中或於像前只塗一半月壇亦得內以悲心外現怒相應洗浴斷食如前阿毗遮嚕迦法者犯五無間謗方廣大乘毀滅佛性背逆君主惑亂正法於如是等人深起悲愍應作降伏法若為自己所求及有怨讐而作此法準諸經說必定反招災禍及反得盡世癡騃行者宜慎之故金剛陪囉嚩輪儀軌經云持呪之人自心不得愚癡憎嫉於諸有情具眾善人輙作此法為惱害者當來感果入於號呌大地獄中受於眾苦經無量劫持呪之人當須遠離如是過惡方可修習此曼茶羅求諸成就以驢糞或駝糞或燒屍灰以用塗壇作此法時身著黑衣或青衣面向南左脚押右脚蹲踞坐觀本尊黑色取臰無香氣黑色或青色華供養所供養飲食香華果子等燈燭地等並皆黑色或青色押即壓也有云閼伽用黑器飲食用石榴汁染作黑色或青色塗香用栢木閼伽用牛尿以黑色華及芥子栢木塗香等各取少分置閼伽水燒安息香然芥子油燈持明藏儀軌云其閼伽水若作息災法用乳汁大麥同作若作增益法加脂麻若作調伏法加血及蕎麥所用閼伽器亦有差別蘇悉地經云羮臛之中味甘甜者及乳粥扇底迦用味酢甜者及石榴粥酪粥等布瑟徵迦用味苦辛淡者及胡麻粳米豆子等阿毗遮嚕迦用如前所說諸食味等或隨方所種種有異觀上中下而奉獻之凡猛利成就及阿毗遮嚕迦事日月蝕時最是相應其爐三角以己身血塗或用苦楝木或用燒屍殘柴而用護摩火著已後以燒屍灰和己身血而用護摩及以毒藥自血芥子油赤芥子和而用護摩從月二十三日至月盡日取午時中夜二時念誦夜作護摩真言曰吽者禮主禮準泥令某甲鉢囉二合喃伽多野吽癹吒吽字合口呼如牛鳴聲吒字半聲呼智譯云若欲降伏一切惡鬼神及損三寶人天者有多罪業障重眾生難調伏者能令發菩提心修諸善業者應起慈悲心而作此法云云蘇悉地經云或有真言初有𤙖字後有㧊吒字速得成就阿毗遮嚕迦法復須善解修真言法隨所求事隨稱彼法真言之相誦彼真言即得成就持明藏云若作息災增益法時輕輕誦吽字又癹吒字若作調伏法當起忿怒心厲聲持誦吽字癹吒字若無壇場可於準提像前安置鏡壇更想一青色三角壇於三角壇中遍想囉字或㘕字尊像供具自身俱想在三角壇中或於像前只塗一三角壇亦得以忿怒心相應洗浴換衣斷食如前若惡人等身心不安或得大病或命欲終即當勸彼令發善心若是悔過自責永斷惡心者即為彼人作息災法念誦彼人即免災難此上四種法若欲於中求成就者須預前持誦準提真言五十萬遍或七十萬遍或百萬遍而為先行方於四種法中隨心所作一法決定成就當依本經用真言印契結界護身供養迎請本尊念誦畢復如前作供養解界奉送本尊等印呪故持明藏經云若作如上四法必須請召本尊及眾賢聖作法竟却發遣蘇悉地經云護摩了已用本尊真言真言淨水以手遠巡散灑爐中如是三度護摩都了乃至復作供養等已如法發遣又持真言行者不應與彼別持誦人更相試騐若緣小過者不應作降伏之法持明藏云又行人以紅華染線用童女合以真言加持一千遍結七結已繫於腰側真言曰唵引賀囉一賀囉二滿提戌訖囉二合䭾引哩尾三悉提引娑嚩二合引賀引四戍亦作縮此真言亦能禁伏戍訖囉及能破設咄嚕蘇悉地經云取白氎絲及以麻縷令童女染紅色或金色作線取結為真言索持誦七遍而作一結一一如是乃至七結置本尊前以真言持經一千遍或持誦時及護摩時欲臥之時應以繫腰不失精穢臥時應如師子王右脇而臥真言同上但滿提字彼作滿䭾滿䭾為異又蘇悉地供養法云其腰線者令童女右旋搓合經三合已重更三合若網調雲作以五淨用灑之佛部五淨真言曰那謨婆迦嚩帝烏瑟膩二合沙也微輸上聲提微囉誓尸吠扇引底羯里莎訶又云以紅藍華染或金染如前法成就已以結索真言持誦千遍於念誦護摩時及以睡時繫於腰間能止失精念誦之時及護摩時須上下著衣偏袒右肩若大小便應著木屐於本尊及二師耆宿前不應著之言謗方廣大乘者謂華嚴法華楞嚴楞伽維摩圓覺勝鬘涅槃諸大經典廣談真如實相謂一切眾生本來成佛性具恒沙德用誹謗不信自損損他俱墮阿鼻千佛出世莫能救拔毀滅佛性者謂一切眾生本具佛性只因妄想煩惱積集而不證得若息妄歸真即與諸佛同一覺源凡夫邪見毀而不信自他斷滅佛性種子作一闡提永劫難救故於如是等人深生悲愍作法降伏令其回心向善也持明藏經云若以唵字為首者能成就一切法若左字於息災增益降伏三法有大威力隷字能破壞設咄嚕亦作發遣及擁護法功力最大主字能作破壞及散他軍如金翅鳥能食於龍隷字破諸大惡有最勝力準字能成就一切而能破堅固禁縛泥字能破魔怨及諸大惡莎字能自擁護及能破怨賀字能除大毒及一切病如是等字猶八正道能使有情解脫輪迴後得涅槃若諸真言所用加唵字能為警覺及作發遣若加唵隷吽三字力能斷截若加唵羅吽癹吒五字力能驚怖及能破壞亦能擁護若加唵主曩謨四字者能成就敬愛法若加唵主吽三字能退他軍若加唵隷癹吒四字者能息大鬦戰音釋𩕳乃挺切音寧去聲梵音亦同你𠆙切身𪘨音齋枲音徙㧊音潑衒音眩自矜也又賣也設咄嚕此云冤家也安善那眼藥𢍶音見抒滿也枿音不噦嗌上音洲入聲下音抑咳𠻳上音慨下音搜去聲臰同臭惡氣也棓同棒又連枷䟦折囉此云金剛杵
