body:
  text: 唐天竺三藏法師大廣智不空奉詔譯清東鼎湖山菩提心沙門弘贊會釋按如來一代説法教分三藏所謂修多羅毗奈耶蘇怛即經律論也藏雖分三而不出顯密二門顯則廣談性相曉悟玄理修證法身密乃但令誦持不加了知默登聖位然悟有頓漸位有淺深漸則歷諸僧祗頓即立超十地淺則聲聞緣覺菩提深即現證佛果大乘今此準提陀羅尼即經藏密教默證十身佛果大乘也或於三藏外立一雜藏收諸部陀羅尼或於三乘外別立最上金剛乘即是陀羅尼藏若據神變疏則判陀羅尼為大不思議成佛神通乘故此經以大祕密為宗法界真如為體不思議為用三密為門最上乘為教相以一切法皆從金剛陀羅尼乘中流出如千流萬派發自崑崙石磧之山三藏十二分教出乎總持祕密之藏乃至六度萬行莫不從陀羅尼所出謂真言一一字全是無相法界而六度萬行無不從法界中流出故云唵字者是三身義亦是一切法本不生義由一切法本不生故即得不生滅由不生滅故即得相無所得相無所得即是無相法界實則證法界真如故白傘蓋頌云誦滿一萬八千遍遍遍入於無相定號成堅固金剛幢自在得名人中佛又五祕密修行儀軌云金剛薩埵者是普賢菩薩即一切如來長子是一切如來菩提心如經所説金剛薩埵三摩地名為一切諸佛法此法能成諸佛道若離此法更別無有成佛欲知金剛者名為般若波羅蜜能通達一切佛無滯無礙猶如金剛是故出生諸佛若於顯教修行者久經三大無數劫然後證成無上菩提於其中間十進九退或證七住以所集福德智慧回向聲聞緣覺道果仍不能證無上菩提若依毗盧遮那佛自受用身所説內證自覺聖智法及大普賢金剛薩埵地受用身智乃至應時集得身中一大阿僧祇劫所集福德智慧則為生在佛家其人從一切如來心生從佛口生從佛法生從法化生得佛法財從此已後受得廣大甚深不思議法超越二乘十地是知真言祕密之旨尚非因位菩薩所知況容凡夫小智能測茲會衆譯并諸疏鈔略為互相發明以便初學持誦有所措心非敢曰釋如神變疏云金剛手方可探其蓮華眼始能窺其奧首楞嚴云諸佛祕密法唯佛與佛自相解了非是餘聖所能通達但持誦之能滅大過速登聖位天竺止觀云上聖方能顯密兩説凡人但能宣傳顯教不能宣傳密教故非下凡所議師心可知今按此準提真言前後數譯而不空三藏深得密教之傳由昔金剛薩埵親於毗盧遮那牟尼如來前受瑜伽最上乘義後數百年傳於龍樹菩薩龍樹又數百年傳於龍智阿闍黎龍智傳於金剛智法師金剛智來遊震旦以五部瑜伽及毗盧遮那經蘇悉軌範授與不空三藏及智滅度三藏奉其遺教復遊天竺諸國增廣其學於師子國從龍智阿闍黎求開十八會金剛灌頂及大悲胎藏之法法化相承自毗盧遮那如來至於不空三藏凡六葉矣空既遍遊天竺復得親傳之旨故其所譯本真言儀軌委悉詳備今恐初學未間梵音印契由是於諸譯中多取智所譯本而會明之以其師資相承授受無替故也如是我聞謂如來如實相理説是準提陀羅尼法故云如是阿難尊者親從佛聞如是之法故云我聞一時是説此經之時也薄伽梵此是如來衆德至尚之稱具六種義一自在二熾盛三端嚴四名稱五吉祥六尊貴廣如餘處釋在名稱大城梵言舍衛逝多林舊云祇樹謂林樹是祇陀太子所施也給孤獨園給孤獨是須達長者之別名園是長者布金所買之地二人共施故名合稱也與大苾芻衆并諸菩薩及諸天龍八部前後圍繞此是聽法之衆愍念未來薄福惡業衆生即入準提三摩地説過去七俱胝佛所説陀羅尼曰愍念謂如來悲愍慈念衆生也梵語三摩地華言等持謂定慧平等任持者也俱胝華言百億陀羅尼華言總持謂總持一切法門含攝無盡教理行果又持善不失持惡不生故亦翻為遮持謂遮二邊之惡持中道之善別名為呪元非正翻既含多義故非名言所能宣釋究其實乃毗盧遮那如來諸佛大不思議祕密心印也曩謨颯多引南引一三藐三沒馱引俱引胝南引二怛你也二合他引三唵四者禮五主禮六準泥七莎嚩二合引賀引八凡誦真言唵字當引句須分明聲要不緩不急詳如下釋此真言八句上三句是歸敬諸佛説呪之辭下五句正是呪體言引者謂長引其聲二合者謂二字合為一音金剛智譯作折主準提莎嚩訶其上多字南字皆有口傍字去聲地婆訶羅譯作折戾主戾準提莎婆訶闍那岌多譯作折麗主麗準遞莎訶天息災譯作曩莫颯鉢哆喃三藐訖三沒馱句致喃怛你也他唵左𭉷噂禰娑嚩賀莫字入聲鉢哆字二合他字去聲唵字及兩字皆引噂字上聲禰字引餘並同上法賢譯大同天息災初句皆同次句訖三字二合祖字尊字無口此中諸譯不同皆由梵音有輕重之轉故字不一然既梵音即取字之音不取字之義若其善梵音者誦上諸譯而無有異任取一譯誦之但於梵音不訛者皆得也凡是口傍字者須彈舌道之即得其音矣曩謨或作娜麼或作納莫或作南無華言歸命亦云皈依怛你也他華言所謂亦言即説莎嚩賀譯為成就義亦云吉祥義亦云圓寂義亦云消災增益義亦云無住義即是無住涅槃盡未來際利益有情無盡期故若有修真言之行出家在家菩薩誦持此陀羅尼滿九十萬遍無量劫造十惡五逆四重五無間罪悉皆消滅所生之處常遇諸佛菩薩豐饒財寶常得出家十惡者謂殺盜淫妄言綺語兩舌惡口貪瞋邪見四重者謂破四禁戒殺盜淫妄也五逆者一弒父二弒母三出佛身血四弒阿羅漢五破和合僧若造一逆即墮阿鼻地獄一劫受苦具五逆者故云五無間罪梵語阿鼻此云無間謂墮此獄中一大劫受苦無彈指頃間歇也若是在家菩薩修持戒行堅固不退誦此陀羅尼常生天趣或於人間常作國王不墮惡趣親近賢聖諸天愛敬擁護加持若營世務無諸災橫儀容端正言音威肅心無憂惱若出家菩薩具諸禁戒三時念誦依教修行現生所求出世間悉地定慧現前證地波羅蜜圓滿疾證無上正等菩提在家菩薩奉持五戒十善菩薩大戒故云修持戒行出家菩薩俱持沙彌比丘律儀菩薩木叉故云具諸禁戒出世間悉地者即定慧現前乃至證無上正等菩提是也悉地此云成意謂成就世出世間所求大願由含多義故無正翻言證地者釋陀羅尼云瑜伽中從凡至聖總為四地一勝解行地通目地前二普賢行願地通目十地三大普賢地即等覺地四普照曜地即成正覺地亦云成毗盧遮那三身普光地波羅蜜者謂六波羅蜜及十波羅蜜大乘寶王等經云持誦真言行者日日得具六波羅蜜圓滿功德故諸陀羅尼經説真言行者現世能成無上菩提五字陀羅尼頌云諸佛本誓力現成諸聖事即於一座中便成最正覺若誦滿一萬遍智譯云十萬遍即於夢中見佛菩薩即吐黑物黑物表惡業即吐是罪滅福生之相故自見口中吐出黑物或云黑飯其人若罪尤重誦二萬遍餘譯云二十萬遍亦見自口中吐出黑飯即夢見諸天堂寺舍或登高山或見上樹不為罪業所纍故能升躡成就善因故見天堂寺舍或於大池中澡浴滌除罪垢得清淨身或見騰空不為罪業所纏故身輕舉或見與諸天女娛樂謂與慈善根力相應故見與之娛樂或見説法得示教利喜也或見拔髮剃髮拔髮是西國外道之法拔髮剃髮皆表斷除煩惱根株也智譯云或見拔髮自身剃頭或食酪飯飲白甘露食酪飯是成就世間福善飲甘露謂得出世法味或渡大海江河得越苦海或升師子座謂得法王之座或見菩提樹是見道相或乘船是乘般若船得登彼岸之相蘇悉地經云或見乘師子象牛鹿鵝等皆是悉地成就之相或見沙門得離世染而出三界或見居士以白衣黃衣覆頭黃表正白表淨以白淨正法而覆護之智譯云以衣籠覆其頭或見日月表破無明煩惱暗也或見童男童女不為貪欲煩惱所染也或上有乳果樹乳者白義白者善業謂得世出世間善業果報也或見黑丈夫口中吐火焰共彼鬬得勝謂與瞋煩惱魔共戰得勝或見惡馬水牛欲來抵觸持誦者或打或叱怖走而去謂於癡煩惱魔得勝故也或食乳粥酪飯謂得上味福善成就或見蘇摩那華華言稱意華色黃白而極香樹高三四尺下垂如蓋謂表所求善法必得稱意智譯云或見有香氣白華香表五分法身之香謂得五分善業或見國王謂得大人護念獲尊貴勝業也若不見如是境界者當知此人前世造五無間罪應更誦滿七十萬遍即見如上境界應知罪滅即成先行此令誦七十萬遍上言一萬二萬疑誤應如餘二譯云十萬二十萬為當如上所夢境界皆是行者證驗成就之相蘇悉地經云於其夢中見真言主背面而去或不與語當應更須起首念誦如是再三若夢中見真言主與語當知此人不久成就若無境界不應誦持若強念持恐與人禍初持誦時於淨密處起首然後依法畫本像謂準提本尊像或三時或四時或六時依法供養求世間出世間悉地乃至無上菩提皆悉獲得若有修持此陀羅尼當知未來成就處所有難無難悉地遲疾應於淨室以瞿摩夷塗一小壇隨力供養以結界真言結十方界四方四維上下以香水一瓶置在壇中一心念誦其瓶動轉當知所為所求事成就若不動轉其事不成結界真言如下結地界墻界等出智譯云若於佛像前或於塔前若清淨處以瞿摩夷塗地而作四肘方壇復以香華幢蓋飲食燈明燭火隨力所辦依法供養若欲求願先須念誦加持香水散於八方上下結界既結界已於壇四角及其中央各置一香水之瓶行者面向東方互跪誦一千八十遍其瓶即便自轉隨意東西任以上下訶羅譯云呪香水散於四方上下以為結界於壇四角中央各置一香水瓶持呪者於其壇中面向東方胡跪誦呪一千八十遍言加持香水者當誦根本真言三七遍十方灑之又法取一瓦碗以香塗置於壇中專心念誦碗若轉動事即成就若不動事即不成智譯云以淨瓦鉢燒香熏之內外塗香盛滿香水并好香華置壇中依前瓶法而作念誦其鉢即轉與瓶無異若欲得知一切成就不成就事即燒香發啓白聖者願決心疑若右轉即成就若左轉即不成就又法欲知未來之事先塗一小壇令一具相福德童子澡浴清潔著新淨衣服以七俱胝真言加持香塗童子手又加持華七遍置童子手中令童子掩面立於壇中又取別華誦真言加持一遍一打童子手背乃至二十一枚即問童子善惡之事童子皆説智譯令取好華念誦一百八遍以香末塗童子手捧華掩面復自手更取別華念誦擲童子身又法取一明鏡置於壇中先誦真言加持華一百八遍已然後又誦真言一遍一擲打鏡面於鏡面上即有文字現説善惡事智譯或使者即身現鏡中使者即佛母之使者又法欲知事善不善成就不成就取蘇摩那華香油誦真言加持一百八遍塗右手大拇指面誦真言聲不斷絶令童子觀指面上現諸佛菩薩形像或現文字具説善惡智譯云或以硃砂或以蘇摩那華浸胡麻油中塗拇指甲念誦一百八遍即現天神及僧菩薩佛等形像若心有所疑三世中事一一問皆知即拇指上自現又法若人患鬼魅病取楊柳枝或茅草誦真言拂患者身即得除愈訶羅譯云以呪呪茅拂病人得香茅第一不得直茅亦得智譯云以石榴枝白茅香等草念誦鞭拂之又法若患重病者誦真言一百八遍稱彼人名以牛乳護摩即瘥謂以茅草等捏乳誦呪作法擲火中燒之名為護摩智譯云以茅草置酥中念誦七遍擲著火中燒之令煙熏病人即愈所言酥者謂以牛乳鑽煉成酪酪鑽成生酥生酥鑽成熟酥熟酥鑽成醍醐又法若孩子夜啼令童女右搓線誦真言加持結二十一結繫於頸下孩子即不夜啼餘譯云令童女合五色縷一呪一結滿二十一結與病人小男女等頸上繫者惡魔鬼魅等病即得除瘥又法先加持白芥子一百八遍然後取芥子誦真言一遍一擲打彼鬼魅者滿二十一遍其鬼魅馳走病者除愈智譯云或以白芥子置酥中取芥子少許念誦一遍一擲火中如是二十一度病即除愈又法或有患鬼魅以瞿摩夷塗一小壇以麩炭畫地作鬼魅形誦真言以石榴等杖鞭之彼鬼啼泣馳走而去智譯作法同此訶羅譯令於病者前以墨畫其病人形呪楊枝打此畫形亦得除瘥瞿摩夷此云牛糞又法若人被鬼魅所著或復病者身在遠處不能自來或念誦人又不往彼取楊柳枝或桃枝或華加持一百八遍使人將往病人所以枝拂病人或以華使病人嗅或以華打病人鬼魅即去病者除瘥智譯云遣人將去語彼云汝去某甲遣將此枝鞭汝汝若不去損汝無疑若不去鞭之即去又法若被蛇所齧或拏吉你女鬼所持旋繞病人誦真言其病即愈謂繞誦病人數匝即愈又法若人患癰腫等及諸毒蟲所齧取檀香汁和土為泥誦真言七遍塗瘡上即愈智譯令取熏睦香和淨水土塗丁瘡癰癤癬漏即愈又法若人在路行誦此真言不被賊劫傷損亦離諸惡禽獸等難智譯云若在路夜行念誦不缺無有賊盜虎狼惡鬼等怖畏難處持心念誦并作護身彼等諸難即皆自滅若乞食時常持此呪不為惡人惡狗等類之所侵害乞食易得又法若鬬諍言訟論理及談論求勝者誦此真言強勝準提真言如金剛杵擬物皆碎無敢當者故於諍訟理論談説名言法義無不獲勝又法若於江河中行誦此真言不被漂溺及水中惡龍摩竭黿鼉等傷害摩竭此云鯨魚長十餘里或數百里能吞大舟等者謂諸毒蟲蛇類也智譯云或蛇咬即遣彼人圍繞念誦人數匝即愈又法若被囚禁繫閉者誦此陀羅尼速得解脫菩提心體自性空故離一切物猶如蓮性不為垢染今此陀羅尼從諸佛菩提心流出故持誦者自然速得解脫又法若國中有疾病十夜以油麻粳米和酥蜜作護摩即得災滅國土安寧智譯云或國土水旱不調牛馬六畜等疫毒流行應以油麻大麥粳米粟豆酥蜜乳酪白乳木諸雜香等皆置一邊燒香發願為一切衆生除去災難即作手契護身念誦取前諸物念誦加持擲著火中燒之如是七日日別三時作法時別一千八十遍即得滿願一切安樂一切三寶悉皆護念亦能成就一切大願訶羅譯云應以酥和胡麻粳米用手三指取其一撮呪之一遍擲火中燒或經七日七夜六時如是相續不絶一切災疫無不消滅言手契者謂手結印也又法若求豐饒財寶者每日以種種食護摩即得財寶豐饒智譯云若求富饒以粳米油麻置酥酪中手把少許發願念誦七遍擲著火中燒之隨力七日乃至七七日即如其願訶羅譯云以酥和稻穀呪一百八遍火中燒之隨心所願無不成諦財寶增盈也言護摩者即是以前諸物擲著火中燒之以為供養蘇悉地經云於尊像前作護摩爐頂方一肘四面安緣量深半肘緣高四指以牛屎和牛尿塗用香水灑或作圓爐其念誦之處若在房室應出於外望見尊像而穿作爐隨其事業依法作之乳木等物及以香華置於右邊護摩器皿置於左邊坐茅草座攝心靜慮先誦本尊真言一遍請安本座依法供養願尊垂納護摩之食其護摩木有十二種此方無有可用紫檀或堅實乳木代之取其枝端直者量長兩指或云十指皆新採濕潤者觀其上下一面置之香水淨洗細頭向外粗頭向身以乳酪酥蜜搵兩頭擲於爐內如念誦時置兩手在雙膝間護摩時亦應如是護摩畢用本真言淨水以手遠巡散灑爐中如是三度護摩都了如法發遣若以酥蜜油作法當用杓至娑嚩賀字餘聲未盡即潟爐中初以一杓滿酥護摩一遍中間小杓護摩畢還以一杓滿酥護摩一遍重獻閼伽乃至供養準前重作護身等印乃至解界方可發遣如下所明又法欲令人敬愛歡喜者真言句中稱彼人名即得歡喜順伏訶羅譯云稱彼前人名字一呪一稱滿一百八遍即便敬念又法若無衣念誦即得衣又法意中所求念誦皆得如意準提真言是諸佛心寶如摩尼珠王隨衆生念故云皆得如意又法若人身體肢節痛加持手二十一遍摩觸痛處即瘥若自為若為他皆得又法若患瘧及頭痛以加持手二十一遍摩觸亦得除瘥此等皆謂已成就先行或長持誦準提真言行人故得隨手應物悉驗若初誦行人梵音未淳心不專一反謗無驗獲罪彌深又法塗一小壇取一銅碗滿盛淨灰令童子兩手按灰碗上持誦者應誦真言本尊使者入童子身其碗即轉即下語童子即自結三部三昧耶印誦三部真言即取滑石過與童子童子即於地上書過去未來事吉凶善惡及失脫經論廢忘難義真言印即得知解此中不言遍應是百八遍或持至童子自結印呪為限又法兩軍相敵於樺皮上書此陀羅尼懸於竹竿上令人手把誦真言彼敵即破已上數條餘譯俱缺又法若女人無男女以牛黃於樺皮上書此真言令帶不久當有男女智譯云於樺皮葉上書此陀羅尼并畫童子以紫綵裹之念誦一千八十遍安著髻中即孕或曰諸佛本意令人斷貪瞋等諸煩惱今何却令人起貪念求於世事名利等耶答曰此是諸佛不思議力度生方便之妙用若有衆生不肯直求無上菩提且隨其所欲令持呪求之盡得遂心由是神呪不思議力熏罪業消滅菩提種成自然超凡入聖如此真言諸佛境界十地菩薩尚非其量況凡夫人而得思議哉若具智眼者須終日求而無能求所求之相即與般若相應故非佛縱衆生起貪等煩惱也又法或有女人夫主不敬重取一新瓶滿盛水於瓶中著七寶及諸靈藥五穀白芥子以繒帛繫瓶項以真言加持一百八遍令女人結根本印安頂上以水灌頂即得寵愛敬重非但敬重亦得有子息在胎牢固智譯云取淨瓶盛滿香水別置淨處以牛糞塗作壇念誦一百八遍如是七瓶皆作此法於淨處以香華為道場取瓶內香水洗浴夫即愛樂亦得有孕婦不樂夫亦如前法按一大藏經中陀羅尼神呪總為五部一佛部謂諸佛呪二蓮華部謂觀自在等諸持蓮華菩薩呪三金剛部謂金剛手菩薩并諸金剛神呪四寶部謂諸天呪五羯磨部謂諸鬼神呪此五部每一部各有五部總成二十五部今此準提真言總持攝二十五部故隨所用之無不成就又法行者每念誦時結大印誦真言印塔滿六十萬遍所求之事即得滿足觀自在菩薩金剛手菩薩多羅菩薩即為現身所求如意或作阿蘇羅宮中王或得菩薩地或得長年藥或得敬愛法成就智譯云於大海邊或河渚間沙灘之上以塔形像印印沙灘上為塔形像念誦一遍印成一塔如是數滿六十萬遍即覩見聖者觀自在菩薩等隨其心願皆得滿足或見授與神仙妙藥或見授與菩薩之記或現前來問隨其乞願皆得菩薩等位若欲求聰明取石菖蒲牛黃各半兩搗作末以酥和於佛前作壇念誦五千遍服之即得聰明持明藏經云若有行人欲作最上殊勝成就者一心專注精勤修習先於大海岸邊誦準提根本真言造沙塔六洛叉已於所求事必獲成就金剛手亦名金剛藏又法於菩提道場於大制底前誦此陀羅尼得見聖僧共語與悉地成就得共彼同行即得同彼聖僧菩提道場在中天竺摩竭國佛坐其中成等正覺故以為名制底是佛塔也此塔在菩提場中智譯云右繞菩提樹像行道念誦一百萬遍即見佛菩薩羅漢為其説法欲隨菩薩即得隨從所求如願乃至現身成大呪仙即得往詣十方淨土歷事諸佛得聞正法又欲得見一切鬼神取牛黃念誦令煙火出即塗目并服之即見持明藏儀軌云誦一俱胝數滿得阿羅漢現身與語獲大利益此後與阿羅漢同行亦同其威德又法於高山頂上念誦一俱胝遍金剛手菩薩即將此人領五百六十人同入阿蘇羅宮壽命一劫得見彌勒菩薩聽聞正法聞法已獲菩薩地得不退轉言一劫者此當一小劫計有一千六百八十萬年入阿修羅宮以待彌勒下生上生經云彌勒菩薩五十六億萬歲爾乃下生阿蘇宮其處非一且如清辨論師所入者其宮在南天竺安達羅國城南不遠大山嵓石壁間論師呪芥子擊石壁豁然洞開入中待見彌勒菩薩下生又法上毗補羅山此山在摩竭國又云但有高山亦得有舍利塔像前念誦隨力以香華供養乞食以支身命從月一日至十五日誦陀羅尼滿三十萬遍取其滿日一日一夜不食倍加供養至後夜即見金剛手菩薩將行人往自宮中為行者則示阿修羅窟門入窟中得天甘露壽齊日月金剛手者手持金剛杵表內心具大菩提外摧伏諸煩惱魔又自體堅固成金剛智杵破邪見山證金剛定常持於掌中故名金剛手菩薩者具云菩提薩埵菩提是能覺義薩埵是有情義謂自能覺悟復住生死中覺悟一切有情也智譯不言上山但云在塔前或佛像前或舍利塔前初言在塔前者或如來八大靈塔或法身偈塔非舍利塔也又法於三道寶階從天下處寶塔行者乞食旋繞誦俱胝遍即見無能勝菩薩與願為説妙法示無上菩提道或見阿利底母將此人入自宮中與長年藥還童年少端正可喜獲得伏藏大人許可應廣利益三寶得一切菩薩安慰示其正道乃至菩提道場若誦此陀羅尼者乃至未坐道場一切菩薩為其勝友故常安慰示以三十七品菩提之道令其進修乃至坐菩提樹下成等正覺故云坐道場阿利底母即鬼子母本名歡喜母伏藏謂得地中寶藏諸佛菩薩許其將以廣利羣生供養三寶不得慳慝自用三道寶階在中天竺僧伽舍國昔佛升忉利天為母説法三月訖從天來下天帝化作三道寶階中央黃金左琉璃右瑪瑙佛從中下後阿育王於其處建立寶塔也智譯云若於轉法輪塔前或佛生處塔前或寶階塔前或舍利塔前念誦右繞滿七七日即見彼二菩薩隨其所願皆悉滿足云云持明藏云菩薩授與聖藥變行人身具殊勝相及得一切菩薩接引證道乃至速坐菩提道場又法若人無宿善根無菩提種不修菩提行才誦一遍則生菩提法芽何況常能念誦受持智譯云若讀一遍即得菩提分根器芽生何況誦持常不懈廢由此善根速成佛種無量功德皆悉成就訶羅譯云若得聞此大準提陀羅尼法速疾證得阿耨多羅三藐三菩提若人憶持誦念常不懈廢此佛母心大準提陀羅尼者無量善根皆得成就佛説此大準提陀羅尼法時無量衆生遠離塵垢得大準提陀羅尼大明呪功德得見十方諸佛菩薩諸聖衆等作禮而去七俱胝準提陀羅尼念誦儀軌智譯云依經梵本有十萬偈我今略説念誦觀行供養次第若有四輩弟子發菩提心行菩薩行求速出離生死者先須入三摩耶灌頂道場受持禁戒堅固不退愛樂大乘菩薩戒行於四威儀修四無量發四弘願求離三途於一切事業心不散亂方可入此祕密法門若有修習此陀羅尼求成就者先須澡浴應著淨衣蘇悉地經云三時澡浴應具三衣又內衣一日三時浣濯其衣乾燥香熏灑淨別置睡衣及以澡衣於此三時替換內衣日別一洗乾聽熏灑澡浴洗淨大小便利皆用真言和水而洗淨之若不如法洗淨即無靈驗故根本雜事律佛言若苾芻苾芻尼塢波塞迦塢波斯迦以我為師者咸應洗淨若不洗淨不應繞塔行道禮佛誦經諸天不喜所持呪法皆無效驗若作齋供書經造像得福寡薄云云其洗淨法備載律中蘇悉地經洗淨並同但用呪印及澡灑身有別其洗浴洗淨去穢浣手各有真言俱如餘處應知持明藏儀軌云復誦甘露軍茶利菩薩心真言加持水三掬用灌自頂即成沐浴真言曰唵引阿蜜哩二合帝引吽引一句復誦二十一遍加持水用灑淨及遣魔障然後隨意沐浴所用拭巾亦濯令清淨又洗二手作潔淨已却入道場近於賢聖又凡結印當用塗香塗其二手嚴飾道場安置本尊隨力所辦其道場法應擇勝地作四肘壇掘深三肘謂嚴飾道場隨力所辦幡蓋香華飲食等勝地如下所明智譯云東西南北各量取四肘作方壇掘深一肘除去瓦礫惡土髮毛及骨灰炭蟲蟻等以好淨土填滿築平掘無惡土即取舊土填土若有賸當知其地是大吉祥速疾成就取未墮地瞿摩夷以香水和淨好土為泥誦無能勝菩薩真言加持二十一遍然後埿壇埿已復取五淨相和五淨者瞿摩夷汁牛尿酪乳酥餘部令取黃牛五淨以無能勝菩薩真言加持一百八遍右旋遍塗其壇梵語曼茶羅華言壇壇者生也謂出生無盡功德故又壇者集也是無邊聖賢會集之處如是壇法乃諸佛不思議之神用勿生疑惑依法結之所求必獲如願若在山石上建立或在樓閣或居船上一切賢聖得道處但以五淨塗拭智譯云若在山中及好淨屋不須掘地依前塗拭即張天蓋四面懸幡若有俱胝佛母形像安置壇中面向西若無本尊有諸佛像舍利及大乘經典供養亦得面向東坐結無能勝印按地誦真言七遍加持壇中心又取諸藥七寶并五穀各少分掘壇中心深一肘安諸藥及七寶復取舊土填滿平治以右手按誦地天偈三遍警覺地天神偈曰汝天親護者於諸佛導師修行殊勝行淨地波羅蜜如破魔軍衆釋師子救世我亦降伏魔我畫曼茶羅誦地天真言曰曩謨三滿多沒馱引南引畢哩二合體他以切微曳二合娑嚩二合引賀引地天者謂夜叉羅剎阿修羅龍迦樓羅乾闥婆緊那羅摩睺羅伽部多畢舍遮鳩槃茶等真言亦曰妙言謂從諸佛心中流出乃真實微妙祕密之語一切諸天魔梵及因位菩薩不可得而思議也誦偈加持已然後以檀香塗九箇聖位如滿月智譯云磨白檀香塗作八壇猶如滿月或似八葉蓮華本譯令塗九聖位即是供養根本九字真言智譯令塗八壇擬供全呪八句任意作之皆得以新淨供具金銀熟銅商佉貝玉石瓷木等新器盛諸飲食及好香華燈燭閼伽香水隨力所有布列供養商佉即螺杯也蘇悉地經三時塗地獻華香水種種供養除去萎華續置新者獻供鉢器三時洗挑若在家出家菩薩求成就者每入道場先應禮佛懺悔隨喜勸請發願已應自誓受菩提心戒據此若比丘比丘尼及在家已受三歸五戒八戒者入道場時皆須自誓受菩提心戒蘇悉地經云每日三時澡浴換衣三時供養禮拜懺悔隨喜勸請發願三時讀經及作曼茶羅三時歸依受戒三時護身如是作法定得成就智譯亦令三時受戒禮佛懺悔隨喜而文缺勸請發願今以禮佛懺悔隨喜勸請發願五法詳附于後真言曰唵冒引地止多母怛跛二合引娜野引弭冒地亦作菩提止亦作唧又作質跛或作麼弭亦作彌瑜伽釋云冒地止多此云覺心冒字為種子冒字者詮一切法無縛義也若能知自身中菩提之心自性成就三世平等猶如虗空離一切相則能了知一切有情心及諸佛心皆如自心本來清淨則起大悲深生矜愍種種方便令諸有情離苦解脫得至究竟無縛無解是為廣大菩提心也菩提心者離一切我執遠離蘊處界及離能取所取於法平等自心本不生自性空故如過去一切佛菩薩發菩提心我亦如是此名自誓受菩提心戒由誦一遍思惟勝義諦獲得無量無邊無為功德莊嚴三業乃至菩提道場其福無間斷速滅一切業障真言速得成就本尊現前如華嚴入法界品慈氏菩薩為善財童子説菩提心功德蘊即五蘊處即十二入界即十八界如餘處釋受菩提心戒儀云今所發覺心遠離諸性相蘊界及處等能取所取執諸法皆無我平等如虗空自心本不生空性圓寂故如諸佛菩薩發大菩提心我今如是發餘如入法界品明自誓受菩提心戒已全加半加隨意而坐端身閉目即結定印想空中準提佛母與七俱胝佛圍繞遍滿虗空定中禮一切諸佛及準提佛母然後以香塗手應結契印先結定印次結禮佛印俱如後出智譯云安心定坐除一切妄想觀六道衆生無始以來生死海中輪回六趣願皆發菩提心行菩薩行速得出離即以塗香摩手而結手印結印時以衣覆手勿令人見先結三部三摩耶契次結諸契佛部三摩耶印即三昧印蘇悉地經云先於室內當置尊容幀或制底或但置座入時面向於尊合掌曲身口誦真言入便禮已而供養之真言曰唵入嚩二合里多二合路者泥𤙖泮吒七遍誦之次即應作三部三摩耶印及真言二手虗心合掌開二頭指屈輔二中指甲下第一節側二大指各附二頭指根下即成當心誦真言七遍想於如來三十二相八十種好相好分明如對目前智譯云福智手並仰檀戒忍慧便願微屈相拄進力壓忍願上節禪智附進力側即成蘇悉地經印同智譯檀戒忍進禪從右手小指起慧便願力智從左手小指起此是十波羅蜜真言曰唵引一怛他引蘖覩引二納婆二合嚩引野娑嚩二合引賀引三覩或作妬納或作娜智譯作唵怛他孽覩嚩皤耶娑嚩訶以契頂上散之皤字去聲下並同由結此印誦真言故即警覺一切如來悉當護念加持行者以光明照觸所有罪障皆得消滅壽命長遠福慧增長佛部聖衆擁護歡喜生生世世離諸惡趣蓮華化生速證無上正等菩提大寶樓閣經云或山頂上誦呪盡目所覩處五逆十惡諸衆生等皆得滅一切罪來世生諸佛淨土蓮華化生而況持呪行者不蓮華化生滅一切罪耶蓮華部三摩耶印以二手虗心合掌散開二頭指二中指二無名指屈如蓮華形安印當心誦真言七遍想觀自在菩薩相好具足於頂右散二小指二大指相著餘六指散開微屈如開蓮華觀自在菩薩相好如觀無量壽經説真言曰唵引一跛娜謨二合引二納婆二合嚩引野娑嚩二合引賀引三跛娜或作鉢訥智譯作唵鉢頭牟嚩皤耶莎嚩訶由結此印誦真言故即警覺觀自在菩薩等持蓮華者一切菩薩光明照觸所有業障皆悉消滅一切菩薩常為善友無量壽如來供養儀軌云由結此印及誦真言警覺觀自在菩薩及蓮華部聖衆皆來加持行者獲得語業清淨言音威肅令人樂聞無礙辨才説法自在金剛部三麼耶印以左手翻向外以右手掌背安左手背以左右大小指互相鈎如金剛杵形安於當心想金剛手菩薩誦真言七遍頂左散印蘇悉地經云兩手中間六指微令開如三股杵此三印名為大印諸佛菩薩猶不能違況諸魔類等非但順教亦滅諸罪以除諸難所求之法必得順願智譯令左覆右仰大小指相交然其印成皆同本譯真言曰唵引一嚩日嚧二合引二納婆二合嚩引野娑嚩二合引賀引三智譯作唵嚩折嚕婆皤耶莎嚩訶由結此印及誦真言故即警覺一切金剛聖衆加持擁護所有罪障皆得除滅一切痛苦終不著身當得金剛堅固之體供養儀軌云由結此印及誦真言警覺金剛藏菩薩并金剛部聖衆皆來加持行者獲得意業清淨證菩提心三昧現前速得解脫按智譯結三部三摩耶印後即結佛母根本身印誦佛母真言七遍今本譯在持珠念誦前結根本印如欲結者準理無妨其印如後閼伽印出次結第二根本印用護身智譯以此印在後持數珠念誦前用而別有辟除一切天魔惡鬼等印呪本譯用此印及心真言護身後復以無能勝印呪辟除障者二手外相叉二頭指二大指並直豎即成誦佛母心真言印身五處所謂額次右肩次左肩次心次喉頂上散真言曰唵迦麼黎尾麼黎準泥娑嚩二合賀引結護身印時起大慈心遍緣六道四生願一切有情被大誓莊嚴堅固金剛甲胄速證無上正等菩提大誓莊嚴堅固金剛甲胄者謂菩薩以四弘誓而為莊嚴不為邪魔之所沮壞遇逆順緣心無退轉故願諸有情皆披如是堅固金剛甲胄離諸障難速證無上菩提如是想已即成被金剛甲胄一切諸魔不敢障難次結地界橛印二手內相叉豎二大指二頭指二小指各相合屈左頭指如鈎三掣大拇指指地印成一掣誦真言一遍智譯云以左右二中指二無名指叉入掌右壓左右頭指屈如鈎左頭指直豎二大指二小指令面相著真言曰唵準你你枳引邏野娑嚩二合引賀引智譯唵準你泥枳邏耶莎嚩訶誦一遍以印大母指觸地一回如卓橛勢三度作即休由結此印誦真言加持地界故下至水際如金剛座天魔及諸障者不為惱害少加功力速得成就地中所有諸穢惡物由此印呪加持力故悉皆清淨持誦者次應於壇中心想八葉大蓮華上有師子座座上有寶樓閣垂諸纓絡繒幡幢蓋寶柱行列垂妙天衣周布香雲普雨雜華奏諸音樂寶瓶閼伽天妙飲食摩尼為燈如無曼荼羅但於空中觀想即成作此觀已應誦此偈以我功德力如來加持力及以法界力普供養而住誦此偈已即誦大虗空藏菩薩真言曰唵一誐誐曩引三婆嚩二嚩日囉二合斛引三三字去聲婆字去聲誐字或作伽字輕呼由誦此真言加持故所想供養具真實無異一切聖衆皆得受用按無量壽儀軌誦大虗空藏真言先令結印以二手合掌二中指右押左外相叉博著手背二頭指相蹙如寶形想從印流出無量諸供養具衣服飲食宮殿樓閣等行者縱使觀念力微由此印呪加持力故諸供養物皆成真實廣大供養又準別部有出生供養印二手當心合掌以十指右壓左頭相交復安在頂上誦出生供養真言二十一遍即唵字也由唵字真言及印不思議力自然遍法界出生無盡香華燈燭幢幡寶蓋衣服臥具樓閣宮殿音樂唄讚等種種諸供養具供養遍法界無邊佛法僧三寶等若無飲食香華等但對像前結印誦唵字真言自然有無量供養遍供法界無盡三寶是知唵之一字如摩尼珠隨心所現亦如本經所想悉皆成就又此唵字是一切真言字母能生一切真言字義是故一切真言皆首宣之次結寶車輅印車昌遮切扯平聲輅魯故切音路二手內相叉仰掌二頭指橫相挃以二大指各捻頭指根下想七寶車輅佛部使者駕御七寶車輅乘空而去至於色界頂阿迦尼吒天毗盧遮那佛宮殿中誦真言七遍智譯云先以二手向內相義右壓左即仰開掌二頭指直伸頭相拄以二大指撥二中指頭來去即成心想阿迦尼吒天宮中毗盧遮那如來十地菩薩圍繞集會中請準提佛母聖者乘七寶莊嚴車輅上有白蓮華座座上有如所畫形像心中想念如在目前阿迦尼吒天此云色究竟天是色界最頂天亦名有頂天真言曰唵引一覩嚕覩嚕吽引二嚕字轉舌呼智譯無吽字有莎嚩訶字由誦真言結印加持故七寶車輅至色界頂準提佛母并八大菩薩及諸聖衆眷屬圍繞乘七寶車輅八大菩薩者一觀自在二彌勒三虗空藏四普賢五金剛手六文殊師利七除蓋障八地藏菩薩若毗盧遮那佛內心證得三摩地智則流出十六菩薩一金剛薩埵二金剛王三金剛愛四金剛善哉五金剛寶六金剛威光七金剛幢八金剛笑九金剛法十金剛劍十一金剛因十二金剛語十三金剛業十四金剛護十五金剛藥叉十六金剛拳菩薩瑜伽分別聖位修證法門云夫真言陀羅尼宗也是一切如來祕密之教自覺聖智修證法門亦是菩薩具受淨戒無量威儀入一切如來海會壇受菩薩職位超過三界受佛教敕三摩地門具是因緣頓集功德廣大智慧於無上菩提皆不退轉離諸天魔一切煩惱及諸罪障念念融證佛四種身謂自性身受用身變化身等流身滿足五智三十七等不共佛法然如來變化身於閻浮提摩竭陀國菩提道場成等正覺為地前菩薩聲聞緣覺凡夫説三乘教法或於他意趣説或自意趣説種種根器種種方便如法修行得人天果報或得三乘解脫果或進或退於無上菩提三無數大劫修行勤苦方得成佛王宮生雙樹滅遺身舍利起塔供養感受人天勝妙果報及涅槃因不同報身毗盧遮那如來於色界頂第四禪阿迦尼吒天宮雲集盡虗空遍法界一切諸佛十地滿足諸大菩薩證明警覺身心頓證無上菩提自受用佛從心流出無量菩薩皆同一性謂金剛性對毗盧遮那如來受灌頂職位彼等菩薩各説三密門以獻毗盧遮那佛及一切如來便請加持教敕毗盧遮那佛言汝等將來於無量世界為最上乘者令得現生世間出世間悉地成就若依次説前後有差據報身佛頓證身口意三種淨業遍周法界於一一法門一一理趣一一毛孔身分相好盡虗空界不相障礙各住本位以成遍照光明毗盧遮那自受用身他受用身若依二乘次第而説若不具修三十七菩提分法證得道果無有是處若證自受用身佛必須三十七三摩地智以成佛果梵本入楞伽偈頌品云自性及受用變化并等流佛德三十六皆同自性身并法界身總成三十七也以三十七內證無上金剛界分智威力加持頓證毗盧遮那之身從無見頂相流出無量佛頂法身雲集空中以成法會光明遍覆如塔相輪十地滿足莫能覩見冥加有情身心罪障悉令殄滅無能知者雖不能知能息諸苦而生善趣從光流出十六菩薩及八方等內外大護展轉出光照觸惡趣以成窣堵坡階級衛護諸佛窣堵坡法界宮殿成為全身現證金剛界如來毗盧遮那遍照之身也是知準提佛母乃從毗盧遮那身流出而準提真言即諸佛內心自證之法故云七俱胝如來所説以能出生諸佛故云佛母也次結請車輅印準前印以二大指向身撥二中指頭即成誦真言七遍真言曰曩麼悉底哩三合野地尾二合迦引南引一怛他引蘖多引南引二唵嚩日𠻴二合引擬斫以切你也二合引三羯哩灑二合也娑嚩二合賀引四南亦作難𠻴亦作朗又作㘕擬亦作祇蘖多應作孽跢你也亦作娘字上聲羯哩亦作迦囉由誦真言加持故聖衆從本土來至道場空中而住智譯無此真言印契唯用後真言印契請之修真言行者隨準一法皆成次結請本尊印從車輅下降於道場本尊即準提佛母準前第一根本印以二大指向身招誦真言三遍第一根本印即前佛部印下言準前根本印同此智譯云以二大指來去招之三度想聖者從寶車上下來道場中白蓮華座上蘇悉地經請云今有某甲為某事奉請仰惟尊者以本願故降赴道場願垂哀愍受此閼伽及微獻供當請之時誠心作禮再三啓白若不誠心徒多念誦乃至真言亦皆殷勤加翳醯字此更祕密速滿其願真言曰唵者禮主禮準泥翳醯曳呬婆戰嚩底丁以切娑嚩二合賀引婆字去聲呼智譯作唵折主準提噎醯曳醯薄伽嚩底莎嚩訶伽誐揭孽四字同音戰字疑是戟字當伽字輕呼蘇悉地經云奉請已作如是言善來尊者愍我等故降臨道場復垂哀愍當就此座坐受微獻供復起誠心頻興作禮而白尊言大悲垂愍乘本願故而見降臨非我所能應須辦供先獻塗香次施華等復獻燒香次獻飲食次乃然燈如其次第次結無能勝菩薩印辟除障者二手右壓左內相叉作拳豎二中指頭相合即成繞身右旋三匝作是思惟所有障者毗那夜迦諸惡鬼神遠走而去所來聖衆不越本三麼耶大悲而住願垂加護凡修真言行者及坐禪人須先以呪印除諸魔障故金光明經云十地菩薩尚以呪護持況其凡夫如首楞嚴經云若不持呪而坐道場令其身心遠諸魔事無有是處悉地經云若成就諸餘事者應當發遣諸有障者若不遣除後恐傷及所以先須作遣除法真言曰曩莫三滿多沒馱引南一唵引二戶嚕戶嚕三戰拏引里四麼引蹬耆娑嚩二合引賀引五戰或作贊耆或作擬里作哩持明藏云此呪能成就一切事次結墻界印準前地界印屈右頭指展左頭指右旋三匝隨心近遠即成金剛堅固之城諸佛菩薩尚不違越何況諸餘難調伏者毗那夜迦及毒蟲利牙爪者不能附近無量壽儀軌云想從印流出熾焰以印右旋繞身三轉隨心大小成金剛光焰方隅墻界諸魔惡人虎狼師子及諸毒蟲不能附近神變疏云持呪行者得諸佛歸命故佛頂偈云十方世界諸如來護念歸命受持者然諸佛尚且歸命持呪人而敢有違越者乎毗那夜迦此云豬頭象鼻真言曰唵準你儜鉢囉二合迦囉耶娑嚩二合引賀引智譯儜字作泥字誦三遍以印右揮三匝次結上方網界印準前墻界印展左頭指右壓左當中節相交即成誦此真言三遍智譯云準墻界印開仰著右大指捻左頭指頭左大指捻右頭指頭小指依舊相拄即成真言曰唵準你儜半惹囉娑嚩二合引賀引惹字自攞切智譯儜字作泥字囉字作邏字誦三遍以印隨日揮三度按別部以印於頂上右旋轉便散由誦真言結印加持故即成金剛堅固不壞之網無量壽儀軌云由印呪加持力故即於上方覆以金剛堅固之網乃至他化自在諸天不能障難行者身心安樂三摩地易得成就次結火院密縫印以左手掩右手背相重令無縫直豎二大指即成誦真言三遍右旋三匝想金剛墻外有大金剛火焰圍繞智譯云以左手密掩右手背相重直豎二大指相去二寸許無量壽儀軌云想從此印流出無量光焰以印右旋三匝則於金剛墻外便有火焰圍繞即成堅固清淨火界真言曰唵一阿三莾擬宜以切你二合吽引癹吒半聲呼二三字去聲莾字上聲亦作摩或作𤚥又作瞢引擬或作擬蘇悉地經令咽聲念之智譯作唵阿三摩你𤙖莎嚩訶由結此印誦真言成大結護密縫不被諸魔入次結閼伽印閼伽或作遏伽又作阿伽此云器凡供養之器皆稱曰閼伽謂以金龍腦白檀香等水盛于閼伽妙器中而奉獻之其器或金銀寶玉銅石瓦木螺杯及綴蓮葉乳樹葉皆得為閼伽供養有云法中使熟銅作閼伽器最上蘇悉地經云作扇底迦法當用白器置少小麥及乳作布瑟徵迦法當用黃器應著胡麻及酪作阿毗遮嚕迦法當用黑器當致粟米及牛尿或自血餘如下釋二手內相叉豎二中指頭相著以二頭指捻二中指背二大指側附二頭指根下即成根本印準前根本印微屈二大指入掌即成閼伽印誦真言三遍智譯云準前根本印以二大指各捻頭指根第一節側下即成真言曰唵者禮主禮準泥遏鉗鉢囉二合底引蹉婆誐嚩底異丁反娑嚩二合引賀引智譯作唵折隸主隸準提遏鉗薄伽嚩帝鉢囉底槎莎嚩訶按此真言與本譯同但後二句相倒不同耳本譯以鉢囉底蹉在先婆誐嚩底在後彼以薄伽嚩帝在先鉢囉底槎在後為別持明藏經亦同智譯行者思惟聖衆了了分明想自身在諸佛聖衆足下手持七寶閼伽器盛香水浴聖衆足由獻閼伽香水故行者三業清淨洗滌煩惱垢業障消滅無量壽儀軌云由獻閼伽香水浴聖衆雙足令行者三業清淨洗除一切煩惱罪垢從勝解行地至十地及如來地當證如是地波羅蜜時得一切如來授與甘露法水灌頂又五字心陀羅尼云飲此水者除諸災患次結蓮華座印準前根本印並二大指向身豎運想從此印流出無量師子座奉獻一切聖衆是諸聖衆各各皆坐智譯印呪並同而印云並二大指向身開豎之即成心想道場中種種寶鈿師子座上開白蓮華安置聖者即誦真言三遍真言曰唵一迦麼邏娑嚩二合引賀引二麼亦作摩上聲邏亦作攞或作囉由結座印誦真言奉獻聖衆故行者當得十地滿足得金剛之座行者亦得三業堅固猶如金剛言金剛座者謂坐金剛座而成等正覺也今此神呪是諸佛境界有不可思議神力但當生信誦持自然滅障成德超凡證聖故云當得十地滿足得金剛之座持明藏經云行人誦真言已即言惟願聖衆處此座已安住道場受我供養次結澡浴印準前根本印以二大拇指頭捻二中指中節即成誦真言三遍智譯以二大指各並捻二中指下節側真言曰唵者娑嚩二合引賀引想從此印流出無量光明一一光明道有無量七寶賢瓶想滿天妙香水灌注一切聖衆澡浴復想空中有無量天樂供養本尊諸佛菩薩一切聖衆由結此印誦真言故行者不久當得法雲地法雲地是第十地謂菩薩修行功滿唯務化利衆生大慈如雲普覆一切也神變疏云如餘菩薩為求菩提雖行難行苦行如救頭然經無量劫尚不能得真言行者不虧法則只於此生得菩提也大教王經云若不依祕密課誦修行終不成於無上菩提也次結塗香印準前根本印以二大指傅著右頭指下節側即成誦真言三遍智譯印呪悉同真言曰唵禮娑嚩二合引賀引想從此印流出無量光明一一光明道有無量天妙塗香末香雲海供養本尊諸佛菩薩一切聖衆由結此印誦真言故當證一切如來戒定慧解脫解脫知見香香以熏聞為義故感證五分法身之香如餘菩薩由持戒清淨則戒體成就而得無持無犯若修習無漏禪定則根塵泯淨而便離諸散亂若修習無漏智慧則能斷三界煩惱而出離生死若不作諸業則脫諸纍縛而得自在知即無生智眼謂照了識心虗妄分別則無生之智眼自在明了今持真言行者不假餘修由真言力故即越諸階級而證得五分法身理趣疏云性德力大密呪功強解行雖劣解脫則疾故成佛心要云顯教圓宗須要先悟毗盧法界後依悟修滿普賢行海得離生死證成十身無礙佛果如病人得好藥方要須自知分兩炮炙法則合成服之方得除病身安今密教圓宗神呪一切衆生并因位菩薩雖不解得但持誦之便具毗盧法界普賢行海自然得離生死成就十身無礙佛果如病人得合成妙藥雖不知分兩和合法則但服之自然除病身安故大般若經云總持猶妙藥亦如天甘露能療衆惑病服者常安樂次結華印準前根本印以二大指傅著左頭指下節即成誦真言三遍節字下應有側字智譯印呪並同唵主娑嚩二合引賀引想從此印流出無量光明一一光明道有無量種種水陸天妙華雲海供養本尊諸佛菩薩一切聖衆由結此印誦真言故當得大慈三摩地成就能利樂無邊衆生諸災難不著身故大慈即無緣慈也皆言雲海者雲是隨緣義謂此供具色相顯然而智鑒無性從法性空無生法起能現所現能現即行願力所現即供養具逈無所依應用而來來無所從用謝而去去無所至而能含悲潤注法雨益濟萬物重重無盡故如雲像言海者以表供養稱理故深稱事故廣以深廣故喻之如海如是一一供具稱於真理等虗空界即以全法之身遊諸佛剎稱真之物供養諸佛聖衆行者安心觀行於諸供具常稱理而成就以是法施供佛名真供養也次結燒香印準前根本印屈右頭指捻二大指頭即成誦真言三遍智譯印呪並同真言曰唵禮娑嚩二合引賀引想從此印流出無量光明一一光明道有無量和合俱生天妙燒香雲海供養本尊諸佛菩薩一切聖衆由結此印誦真言故當得普遍法界三摩地成就次結飲食印準前根本印以左頭指捻二大指頭即成誦真言三遍智譯印呪並同真言曰唵準娑嚩二合引賀引想從此印流出無量光明一一光明道有無量天妙種種飲食雲海供養本尊諸佛菩薩一切聖衆當得法喜禪悅食三解脫最勝味三摩地成就以愛樂大法得法資長道種心生歡喜不嗜世味常持正念是為法喜食由得禪定自資長養慧命道品圓明正念現前心常喜樂不貪世味是為禪悅食蘇悉地供養法云若不辦塗香乃至燈明供養但誦如上奉塗香等真言及作手印亦成圓滿供養次運心供養者以心運想水陸諸華無主所攝遍滿虗空盡十方界及與人天妙塗香雲燒香燈明幢幡繖蓋種種鼓樂歌舞倡妓真珠羅網懸諸寶鈴華鬘白拂微妙磬鐸如意寶樹衣服之雲天諸厨食上妙香美種種樓閣寶柱諸天嚴身頭冠纓絡如是等雲行者運心遍滿虗空以至誠心如是供養最為勝上是發行者以決定心而行此法運心供養誦真言及作手印如上所想供養皆悉成就蘇悉地經云若香華飲食無可獻者但誦本色真言及此手印獻之表云供物無可求得但納真言以真心故速滿其願離此之外有四供養遍通諸部一切處用一謂合掌二以閼伽三用真言及慕捺羅四但運心此善品中隨力應作或復長時供養中置無過運心如世尊説諸法行中心為其首若能標心而供養者滿一切願又復應知不可才聞運心即便慳貪不辦供養悉地難成若能辦諸供養加以真言運心最為殊勝故彼經云持誦之人不獻飲食違本部者其人乃著魔障身無精光風燥飢渴恆惡思想不能成就本尊真言皆由不獻本尊果食當於六齋等日廣設供養奉獻本尊并諸眷屬當淨洗手嗽口咽水次下飲食若準本部真言運想香華等供養皆從印中流出尤勝以水陸無主香華運想或恐初學觀心未淳用此助成亦妙言三解脫者一空解脫二無相解脫三無願解脫亦名三三昧此三即涅槃門是諸賢聖所常餐履一切解脫法中無過於此故云最勝味次結燈印準前根本印以二頭指各捻二大指頭即成誦真言三遍真言曰唵泥娑嚩二合引賀引智譯印呪並同彼云已上塗香印等各各印觸當色物上供養按諸部陀羅尼別有香華飲食等供養印呪而字句頗繁今此準提陀羅尼唯改本印以本六字真言而成六種供養誠為妙用不可得而思議者想從此印流出無量光明一一光明道有無量種種七寶燈燭雲海供養本尊諸佛菩薩一切聖衆當得般若波羅蜜光明五眼清淨一肉眼二天眼三慧眼四法眼五佛眼般若此云智慧波羅蜜此云到彼岸由獻燈故感智慧光得五眼淨而登彼岸也此上作法結界供養真言與持明藏儀軌經同唯契印有異耳彼經云如是諸印相行人虔心記憶習令精熟於作法時無令誤失若稍疑誤不成印契不成印契即賢聖不喜凡所祈求不獲成就音釋法財謂三密菩提心教法也十二分教一修多羅此云契經二重頌三授記四孤起五無問自説六因緣七譬喻八本事九本生十方廣十一未曾有十二論義苾芻舊云比丘新云苾芻本香草名含五義一體性柔軟喻出家人能折伏身口粗獷二引蔓傍布喻出家人傳法度人連延不絶三馨香遠聞喻出家人戒德芬馥為衆所聞四能療疼痛喻出家人能斷煩惱毒害五不背日光喻出家人常向佛日故菩薩摩訶薩菩薩如上釋摩訶薩者摩訶是大義薩即薩埵是有情義亦名心亦云勇猛以勇猛不怯弱故三大無數劫積集二種資糧故名摩訶薩八部一天謂諸天神也二龍謂龍神也三夜叉此云勇健有在地有在空有在天者四乾闥婆此言香陰不食酒肉天帝樂神也五阿修羅亦作阿蘇羅此云非天謂其果報最勝鄰次諸天也六迦樓羅此云金翅即金翅鳥神也七緊那羅此云疑神似人而頭有角是天帝樂神也八摩睺羅伽此云大腹行即地龍是大蟒神也溺同溺黿音元似鱉長一二丈鼉音陀類魚有足長丈餘甲如鎧樺音話木名皮可貼弓四無量慈悲喜捨四弘願衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成礫音力小石賸與剩同餘也鈿音田金華飾也六道亦名六趣一天二人三阿修羅四地獄五餓鬼六畜生四生化胎卵濕五智一通達智二隨念智三安立智四和合智五如意智謂菩薩起行度生分別顯示而能覺了通達諸法憶持不失建立正教令他修行觀一切法隨緣和合隨意所欲無不滿足故有五種之別詳如攝大乘論釋所明三十七不共佛法謂佛證四種身一自性身二受用身三變化身四等流身梵本入楞伽經偈頌品云自性及受用變化并等流佛德三十六皆同自性身并法界身總成三十七是為三十七不共佛法餘一切聲聞緣覺菩薩所不共有也唐實叉難提譯云自性及受用變化復現化佛德三十六皆自性所成元魏菩提留支譯云實體及受樂化復作諸化佛衆三十六是諸佛實體窣堵坡即佛塔也十身一菩提身二願身三化身四力持身五相好莊嚴身六威勢身七意生身八福德身九法身十智身閼伽閼音遏閼伽水真言中遏鉗字亦作阿哩伽二合阿伽阿入聲音遏蘖與孽孽蘗不同十波羅蜜一施二戒三忍辱四精進五禪定六慧七方便八願九力十智藥叉舊云夜叉搓音蹉娜也五分法身一戒二定三慧四解脫五解脫知見洛叉此云十萬凡經律論中華言梵語各不同者良由如來滅度一百一十餘年後時諸比丘互執見聞各引師説分經律論為五部致於文言呪語有詳有略大雖不殊小則不無其異然佛在世曾已預記我涅槃後經律論當分為五部而皆是如來金口所説但為聞聽不廣故成多部猶如甘露散於人間但同餐飲無不除病延年隨秉一部修行悉成道果是以五天竺國各宗一法咸獲聖證既知如來先為預記則無是無非是故智者不可於中妄生疑惑阻自前進失却千生萬劫之殊妙因果也
