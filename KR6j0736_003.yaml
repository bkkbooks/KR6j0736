body:
  text: 唐天竺三藏法師大廣智不空奉詔譯清東鼎湖山菩提心沙門弘贊會釋次說準泥佛母畫像法亦名尊那菩薩取不截白氎去毛髮者㡧於淨壁先應塗壇以閼伽飲食隨力供養畵師應受八戒齋清淨畫像其彩色中勿用皮膠於新器中調色應畵準泥佛母像身黃白色結跏趺坐坐蓮華上身佩圓光著輕縠如十波羅蜜菩薩衣上下皆作白色復有天衣角絡瓔珞頭冠臂皆著螺釧檀慧著寶環檀慧即二小指智譯云種種莊嚴其身腰下著白衣衣上有華又身著輕羅綽袖天衣以綬帶繫腰朝霞絡身其手腕以白螺為釧七寶莊嚴一一手上著指環都十八臂其像面有三目十八臂上二手作說法相右第二手作施無畏第三手執劍第四手持寶鬘貫寶華為鬘第五手掌俱緣果梵云微若布羅迦果華言子滿果西竺國有此間無第六手持鉞斧第七手執鈎第八手執金剛杵第九手持念珠智譯以第四手持念珠第九手持寶鬘法賢譯第四手執寶鐸而無寶鬘左第二手執如意寶幢第三手持開敷紅蓮華第四手執軍持澡罐也第五手執羂索第六手持輪第七手持商佉螺也第八手持賢缾即淨瓶也第九手掌般若梵夾蓮華下畫水池池中難陀龍王塢波難陀龍王拓蓮華智譯云二龍王共扶蓮華莖座右邊畫持誦者手執香爐瞻仰聖者準提佛母矜愍持誦人眼下顧視上畫二淨居天子一名俱素陀天子手持華鬘向下承空而來供養聖者畫像已隨力僧次請七僧供養請開光明呪願讚歎於像下應書法身緣起偈偈云諸法從緣起如來說是因彼法因緣盡是大沙門說將像於精室秘密供養以帛覆像念誦時去覆帛瞻禮供養念誦畢却以帛覆慎勿令人見何以故從師受儀軌畫像法若轉與人呈像被魔得便當須秘密白氎若無可倩人織與西洋布相似長短濶狹隨宜織之如無能織者可取西洋布權用之亦得彩色中不聽用皮膠當用白膠香等此亦無者可用桃樹膠或以肥皂莢仁去上麤皮取內白淨煎膠或磨黃豆白芨用之皆得僧次者恐無財力不能總請眾僧又復如來不聽擇請故隨僧中次第差赴請也附五悔儀經云每入道場先應禮佛懺悔隨喜勸請發願已應自誓受菩提心戒此之五法乃諸菩薩六時行道之軌轍文備諸經論今略錄其要以便修持行者初入道場長跪合掌專心定意手擎香爐云願此香華雲徧滿十方界一一諸佛土無量香莊嚴具足菩薩道成就如來香供養已次應起禮敬一心頂禮毗盧遮那牟尼世尊分別聖位修證法門云如來最初於無上乘發菩提心由阿閦佛加持故證得圓滿菩提心由證菩提外感空中寶生佛灌頂受三界法王位由觀自在王佛加持語輪說無量修多羅法門由不空成就佛加持於諸佛事及有情事所修行利樂皆悉成就是故如下當次第一一禮之一心頂禮阿閦世尊一心頂禮寶生世尊一心頂禮觀自在王世尊一心頂禮不空成就世尊一心頂禮極樂世界阿彌陀世尊一心頂禮十方法界諸佛世尊一心頂禮七俱胝佛母所說大準提陀羅尼一心頂禮十方法界修多羅藏一切陀羅尼門一心頂禮毗盧遮那宮殿中七俱胝準提佛母菩薩摩訶薩一心頂禮觀自在菩薩摩訶薩一心頂禮彌勒菩薩摩訶薩一心頂禮虗空藏菩薩摩訶薩一心頂禮普賢菩薩摩訶薩一心頂禮金剛手菩薩摩訶薩一心頂禮文殊師利菩薩摩訶薩一心頂禮除蓋障菩薩摩訶薩一心頂禮地藏菩薩摩訶薩一心頂禮無能勝菩薩摩訶薩一心頂禮大勢至菩薩摩訶薩一心頂禮十方法界一切菩薩摩訶薩一心頂禮摩訶迦葉尊者諸大聲聞僧一心頂禮十方法界一切三乘賢聖僧已上俱一拜至準提佛母及準提陀羅尼各須三拜此之人法是道場主故禮已次當懺悔行者應想自身對三寶前憶念先罪及今生所造若不懺悔當墮阿鼻地獄受極大苦豈能成就所修真言妙行持明藏儀軌經云行人於瑜伽法門若欲修習求諸悉地者先於自身種種作法懺除宿業令無障難若不如此聖道難成金剛智譯本與此儀軌雖出懺悔等五法而文簡略恐行者臨文懇禱之情難伸故述餘經以詳其旨如無量壽儀軌云自身五體投地想於一一佛菩薩前恭敬作禮已即右膝著地合掌當心虔誠發露懺悔無始以來一切罪障則隨喜諸佛菩薩聲聞緣覺一切有情所修福業又觀十方世界所有如來初成正覺者請轉法輪所有如來現般涅槃者請久住世不般涅槃又發願言我所積集善根禮佛懺悔隨喜勸請以此福聚迴施一切有情乃至見佛聞法速證無上正等菩提如是知已心生哀切口宣懺悔我弟子某甲至心懺悔自從無始生死以來隨惡流轉共諸眾生造業障罪為貪瞋癡之所纏縛由身口意造五無間罪及十惡業自作教他見作隨喜或塔物僧物自在而用於諸善人橫生毀謗見學聲聞緣覺大乘行者喜生罵辱令諸行人心生悔惱見有勝已便懷嫉妬法施財施常生慳惜無明所覆邪見惑心不修善因令惡增長於諸佛所而起誹謗如是眾罪佛悉知見我今歸命對諸佛菩薩聖眾前皆悉發露不敢覆藏未作之罪更不復作已作之罪今皆懺悔所作業障應墮三途及八難處願我此生所有業障皆得消滅所有惡報未來不受亦如過去未來現在諸大菩薩修菩提行所有業障悉皆懺悔我之業障今亦懺悔咸悉發露不敢覆藏已作之罪願得除滅未來之惡更不敢造懺悔已歸命禮三寶我某甲至心隨喜過去未來現在一切眾生修行施戒心慧所有善根我今皆悉深生隨喜由作如是隨喜福故必當獲得尊重殊勝無上無等之果又於過去未來現在一切諸佛菩薩聲聞緣覺所有無量功德之聚我今至心悉皆隨而歡喜讚歎隨喜已歸命禮三寶我某甲至心勸請十方一切諸佛世尊現得無上菩提者未轉法輪我皆至誠勸請轉大法輪安樂有情十方一切諸佛世尊欲捨報身入涅槃者我今頭面頂禮至心勸請久住世間度脫安樂一切眾生勸請已歸命禮三寶我某甲至心迴向從無始來至於今日於三寶所修行成就所有善根乃至施與眾生一摶之食復以如是持誦秘密功德懺悔勸請隨喜善根皆悉攝取回施一切眾生無悔悋心是解脫分善根所攝如諸佛世尊之所知見不可稱量無礙清淨如是所有功德善根悉以回施一切眾生不住相心不捨相心我亦如是功德善根悉以回施一切眾生共諸眾生同證無上菩提得一切智因此善根更復出生無量善法亦皆回向無上菩提又如過去未來現在諸大菩薩修行之時功德善根悉皆回向一切種智然我所有功德善根亦皆回向無上菩提是諸善根願共一切眾生俱成正覺如餘諸佛坐於道場菩提樹下不可思議無礙清淨住於無盡法藏陀羅尼首楞嚴定破魔波旬無量兵眾一剎那中悉皆照了於後夜中獲甘露法證甘露義我及眾生願皆同證如是妙覺猶如諸佛示現應化得無上菩提轉妙法輪為度眾生我亦如是示現應化得無上菩提轉妙法輪度諸眾生迴向已歸命禮三寶我某甲至心發願願諸眾生悉發無上菩提之心常念十方諸佛功德智慧復願一切眾生頓破無明得見佛性猶如諸大菩薩一切天龍八部增益威光擁護國土及於壇場却諸魔怨令我所修諸佛秘密法要速獲成就發願已歸命禮三寶次應自誓受菩提心戒如上懺悔隨喜勸請迴向文出大金光明經而五法皆言悔者以其悉能除障滅罪禮佛能除我慢障得尊貴身懺悔能除三障得依正俱足隨喜能除嫉妬障得大眷屬勸請能除慢法障得多聞智慧迴向者謂迴自所修善根向於三處即實相菩提及與眾生能除著有及慳悋心由迴向少善徧入三際如滴水投海如聲入角則能遠徧發願能除退屈障得總持諸行速獲妙果然迴向即兼發願今於迴向開出發願以對治無決定心喜退屈障或可入道場時禮佛乃至迴向持誦畢方兼發願亦得念誦畢如前次第結印各誦真言一遍復修五悔若時速不能如上誦懺悔等文可為偈曰我弟子某甲至心懺悔歸命十方佛大聖準提尊一切賢聖眾悉知悉見我今身若前身所造諸惡業我今盡發露眾罪皆懺悔我弟子某甲至心勸請十方一切佛現在成道者我請轉法輪安樂諸眾生十方一切佛若欲般涅槃我今頭面禮勸請久住世我弟子某甲至心隨喜三世諸如來菩薩聲聞眾修習三乘人乃至凡夫類所有諸福善施戒禪定慧忍辱并精進我今皆隨喜我弟子某甲至心發願願諸眾生等悉發菩提心永斷諸煩惱當證一切智復願我今修準提秘密行所求諸悉地隨心速成就我弟子某甲至心回向以我所修福及與真言行回向諸有情共成無上道復以今所修禮拜及懺悔勸請并隨喜發願回向善悉施與眾生永離三途苦同趣大菩提法界真如海附持誦法要今此法要葢為初機行人依經修習三業未淳不能作諸觀行然聞陀羅尼功德殊勝而心急欲持誦或鈍根之人聞經真言觀行心生退怖遂失菩提法芽無量功德如經所說若人纔誦一遍即生菩提法芽何況常能念誦受持由此善根速成佛種無量功德皆悉成就故持明藏云若有眾生作大惡業無有善種於菩提心無由生起菩提分法永不獲得如是之人忽遇知識誦此真言一歷耳根重罪減劣善種即生何況恒常持誦專注精勤漫茶羅疏云念如來之神呪心心暗契如來心誦菩薩之密言願願冥符菩薩願何生死而不出何涅槃而不得有斯利故由是集此法要以便受持行者若欲持誦先須屏息諸緣起慇重心生難遭想至聖像前或對鏡壇正立作合掌頂禮相此是準提菩薩最上頂禮印然後注心觀想尊容五體投地頂禮十方佛法僧三寶次禮毗盧遮那牟尼如來準提佛母觀世音菩薩金剛手菩薩及一切聖眾已胡跪合掌至心懺悔作如是言我弟子某甲自無始以來身口意所作之罪今對三寶諸佛菩薩前發露懺悔不敢覆藏乃至過去現在未來三世諸佛菩薩福智圓滿種種功德我今隨喜然後結金剛正坐以右足壓左䏶上或半加趺或隨意坐次結大三昧耶印以二手仰掌展舒將右手在左手上二大拇指甲相拄安輪下此印能滅一切狂亂妄念雜染思惟既澄定身心即觀六道眾生無始已來於生死海中輪迴六趣願彼皆發菩提心行菩薩行速得出離作是念已即便入淨法界三昧謂想自身頂上有一梵書㘕字此字遍有光明猶如明珠或如滿月想此字已復結金剛拳印以左手大拇指捻無名指根第一節餘四指握大拇指作拳此印能除內外障染成就一切功德右手持數珠即口誦淨法界真言二十一遍真言曰唵㘕或單持㘕字亦得㘕或作囕此是梵書唵㘕字此淨法界㘕字若想若誦能令三業悉皆清淨一切罪障盡得消除又能成辦一切勝事隨所住處悉得清淨衣服不淨便成淨衣身不澡浴便當澡浴若用水作淨不名真淨若兼此法界心㘕字淨之即名畢竟清淨瓶如靈丹一粒點鐵成金真言一字變染令淨偈云囉字色鮮白空點以嚴之梵書囉字上安空點即成㘕字矣如彼髻明珠置之於頂上真言同法界無量眾罪除一切觸穢處當加此字門故蓮華部念誦法云若觸穢處當觀頂上有法界生字放赤色光明所謂㘕字也若實外緣不具無水洗浴闕新淨衣用此㘕字淨之若外緣具者而不洗換託此以為淨是無敬信懈怠之人尚不免輕慢之愆何能滅罪生福成就所求悉地若先用水如法澡浴洗淨著新淨衣更用此真言淨之即內外俱成清淨所祈速獲靈騐次誦護身真言當結本經第二根本印誦心真言七遍或結無能勝菩薩印誦無能勝真言七遍今時多誦他部所謂文殊一字真言唵齒𡄦二合𡄦字當作離禁切彈舌道之或直音疾陵此是梵書唵齒𡄦字此亦唵齒𡄦字原梵書兩種不同亦如此方之隸篆也此齒𡄦字作二合或作三合叱哩陵或作四合體哩呬淫義淨法師譯作叱洛呬𦦨如是四字合為一言方成梵音一字如不善梵音者實難得其真妙此一字呪王功力甚大不可思議如文殊根本一字陀羅尼法云世尊告諸天眾言應知此陀羅尼於諸呪中是大呪王有大神力若善男子善女人能受持者文殊師利菩薩常來擁護或於覺時或於夢中為現身相及諸善事此呪尚能攝得文殊師利菩薩況餘菩薩及世出世賢聖等眾此呪能消一切五逆四重十惡罪業當知是呪於世出世種種呪中最為殊勝是諸佛心能令一切所願皆悉滿足未作法時即能成辦如意等事若發無上大菩提心誦之一遍力能守護自身若誦兩遍力能守護同伴若誦三遍力能守護一宅中人若誦四遍力能守護一城中人若誦五遍力能守護一國中人若誦六遍力能守護一天下人若誦七遍力能守護四天下人若以清旦誦一遍呪水洗面能令見者歡喜乃至云若有眾生為飛頭鬼所執以手自摩其面誦呪一百八遍作可畏相貌便以左手作本生印以大母指屈在掌中用後四指壓大母指上急把拳即自努目陰誦此呪而著病者所患即除若患一切鬼病以呪呪右手一百八遍燒安息香熏之左手作本生印右手摩病人頭患即除愈若欲經過師子虎狼毒蛇怨賊一切險難之處當須盡其身心不得近諸女人及喫五辛一切酒肉於諸眾生起大悲想至心誦呪四十九遍而諸怨惡自然退散假令遇之無不歡喜此呪假令一切眾生或於一劫或無量劫乃至名字不可得聞何況得見專心念誦此陀羅尼能令眾生現世當來常獲安隱與諸如來大菩薩眾常為眷屬是故慇懃生難遇想勿生輕慢起疑惑心廣如經說此不繁錄別譯云若誦百遍能護一國若誦千遍能護四天下舊令誦此一字呪王已復誦六字大明真言一百八遍然後誦準提陀羅尼今恐多雜他部行人反見難持故此不錄如欲持者當如後誦之次誦加持數珠真言用末香塗珠上以二手掌捧珠當心誦真言七遍加持數珠真言曰唵吠嚧引遮那引摩羅娑嚩二合引賀引加持珠已心口作是願言我今欲念誦惟願本尊諸佛菩薩加持護念令速如意所求圓滿然後以左手無名指及大拇指承珠右手以大指無名指移珠當於心前澄心觀想準提佛母與眷屬圍繞了了分明對坐誦準提真言時其聲不緩不急每稱娑嚩賀字同時移過一珠或一百八遍或一千八十遍常須定限不得缺減若務忙者誦一百八遍已後隨意散持之或結根本大印於菩薩臂上記數念誦誦畢頂上散印若一百八滿已不能多記可以左手作金剛拳印右手持珠念誦根本真言曰曩謨颯多引南三藐三沒䭾引俱引胝南引怛你也二合他引唵者禮主禮準泥娑嚩二合引賀引此是梵書準提真言若所求事欲速得成就者當依如上本經作法斷除酒肉葷辛方得應騐如或隨時獲益滅罪生福在家不能全斷酒肉妻妾可於十齋日持誦如欲長持無間斷者非十齋日縱令酒肉妻妾但當一心誦持亦能使短命者增壽疾病者消除經律中謂在家不能長持齋戒令於每月中十日受持八關戒齋斷殺盜婬妄酒香華歌舞戲樂等八事為戒過中不食為齋由此十日淨持齋戒故令念誦真言必獲速騐今時不知齋戒但以不食酒肉為齋謬之久矣茲許酒肉妻妾持誦者由近代俗流酒肉妻妾是其常業雖聞佛戒習性難改若不用此大不思議神呪救拔何日得出生死故佛頂頌云不持齋者名持齋不持戒者名持戒若聞念佛頂陀羅尼便得具於聲戒其有齋戒清淨依法持誦者豈不速出生死乎或有無福無相者求官不遂貧苦所逼常誦此呪能令現世得轉輪王福所求官位必得稱遂若求智慧男女等無不稱意此真言似摩尼珠一切隨心所欲皆得乃至欲請梵王帝釋四天王閻羅天子等但誦此呪隨請必至所有驅使隨自心願此呪於南瞻部洲有大勢力移須彌山竭大海水呪乾枯木能生華果何況更能依法持誦不轉肉身得大神足往兜率天聽聞正法及往十方世界承事諸佛獲菩提記若欲成就壇法如前依經作法或但用鏡壇可取一新鏡未曾用者於佛像前從月十五日夜面向東方置鏡座前隨力莊嚴供養具諸香華閼伽淨水然後結根本大印當於心前誦根本真言呪鏡一百八遍以囊盛鏡常將隨身每欲念誦但以鏡壇置於面前結印誦呪若不能逐日對鏡念誦但於十齋日對鏡念誦餘日不對鏡念亦得若無鏡者但觀想一鏡在前持誦亦成或不能觀想者但只專注念誦亦得成就此準提呪七十七俱胝如來同說龍樹菩薩以偈讚曰準提功德聚寂靜心常誦一切諸大難無能侵是人天上及人間受福如佛等遇此如意珠定獲無等等今時多於準提真言下兼誦佛頂大輪一字明王真言所謂部林字此是梵書部林字亦作彈舌道之二字合為一字亦作步林或作𠽾又作部隴又作勃龍不空三藏譯作勃嚕唵三字合為一字其註云嚕字彈舌共為一音又引聲從胸喉中出其聲如繫大鼓古譯云步林訛不正也如此則音難得其正惟善梵音者能之根本儀軌經云此佛頂大輪一字明王得成就者乃至於諸如來法欲滅時能為佛事復能擁護諸佛如來一切法藏此一字明王於佛滅後末法之時行於世間為無能勝諸真言亦諸佛菩薩悉所受持乃是過去佛菩薩之所傳說若復所在有彼行人專心持誦此大明者於彼所在五由旬內地界之中所有一切諸惡宿曜不能侵近諸惡鬼神皆自馳散乃至一切諸惡不能為害至於天人聖人亦不敢近若持誦者一切業障皆得清淨若作擁護能隱身入一切部多中無所障礙於世間出世間不能為害能摧世間一切惡呪此真言是一切諸佛之頂是文殊菩薩之心能施一切眾生無畏能與一切眾生快樂凡有修持隨意得果同如意珠能滿一切之願若持誦餘一切呪不成就者用此真言共餘呪一處同誦持之決定成就若不成就及靈騐其呪神等即當頭破七分是知此真言能助一切呪疾得成就若欲單持此真言求一切法成就者當依彼經作法念誦若持誦者不能如前誦淨法界真言護身真言乃至大輪一字真言者便可專持此準提陀羅尼若年老衰邁氣力短少不能誦全真言可初誦三遍已後但從唵字起誦下九字亦得又或不能結準提大印即當作金剛拳念誦凡誦呪訖却用金剛拳印誦吽字真言而印五處先印額上次印右肩次印左肩次印心上後印喉上印竟於頂上散之能除一切魔障成就一切勝事又隨所住處欲辟除鬼神可結金剛界但誦準提真言呪香水二十一遍八方上下之灑即成辟除結界持明藏儀軌云或作法時在壇內睡臥或得惡夢即誦佛眼真言八百遍當誦時右手持珠左手執金剛杵真言曰唵引度曩嚩日囉二合郝每日依法持誦時須限定其時分若一時持即當早晨若二時持則兼黃昏若三時持則加正午如務忙者不能依時但有暇時即便持之若上根者持得三密相應一身密端坐結印二語密口誦真言三意密一念專注或想真言梵字或緣持誦之聲或想準提聖容或想菩薩手中所執杵瓶華果等物神變經疏云若用三密為門不須經歷劫數具修諸行只於此生滿足諸波羅蜜故五秘密儀軌云三密金剛以為增上緣能證毘盧遮那清淨三身果位釋陀羅尼文字云若有諸佛不修三密門不依普賢行願得成佛者無有是處若成佛已於三密門普賢行願有休息者無有是處若正持誦時未滿一百八遍不得共人語話如必欲語話時於自舌上想一梵書㘕字縱語話不成間斷語話竟即當續前持之問曰為當只持一道真言功德成就為復廣持多道真言功德成就答曰此有二門一者隨根所樂門謂人根機有於多種好樂不同或有樂持三道五道十道乃至百道等於中隨根所樂皆得持誦二者疾得成就門謂欲求一切功德疾得成就宜專持誦一道真言成時一切真言功德皆悉成就故文殊儀軌經云若欲一切功德成就不得於別真言而起思想是也如上雖有數道真言而皆是持誦準提真言之次第助成勝妙故也又每日對鏡初欲持誦時當如本經想自心如一月輪圓明皎潔有九聖字梵書每一一字想有種種光明布於心月圓明中或不能想此九字可於心月輪中想一梵書唵字或想九梵字安布自身分中言梵書九字有種種光明者如金剛智所譯本頌云唵想安頭上其色白如月放於無量光除滅一切障即同佛菩薩摩是人頂上折字安兩目其色如日月為照諸愚暗能發深慧明𨽻字安頸上色如紺瑠璃能顯諸色相漸具如來智主字想安心其色如皎素猶心清淨故速達菩提路𨽻字安兩肩色黃如金色猶觀是色相能披精進甲準字想臍中其色妙黃白速登妙道場不退菩提故提字安兩䏶其色如淺黃速證菩提道得坐金剛座莎嚩字安兩脛其狀作赤色常能想是字速得轉法輪訶字置兩足其色猶滿月行者作是想速得達圓寂按顯密圓通取諸部陀羅尼字義安布觀想今恐初學反見尤難故依本宗為持誦法要或欲觀想他字義者當如本經末別出一法中所明如有復不能想此梵書者但只專心持誦亦具一切三昧故大悲心經云陀羅尼是禪定藏百千三昧常現前若人緊切持誦時或遇種種魔障或忽然怕怖或口舌難誦或身心不安或多嗔多睡或見諸異相或於呪生疑心不欲持誦等當作對治之法應依本經結第二根本印誦心真言或作無能勝真言印契或觀梵書囉字或觀阿字隨作一法隨觀一字彼等境界自然消滅若分別心多者當觀灑字即成無分別若著有為心多者應觀含字即得因緣法本空故又持明藏經云行人欲作法時先須澄心離諸誼閙於自身分想微妙字相一一現前若得現前一切罪垢皆得消滅微妙字者先於口門想其𤚥字於右肩上想暗字於左肩上想惡字於頭上復想暗字於右臂上想阿引字左臂上想嚩字於臍輪中想吽字復於遍身想阿引字行人每想如是字於身分現時即復誦真言曰吽引左𨽻祖𨽻尊禰引吽引此真言若誦至一洛叉能除一切罪又真言曰唵引左𨽻祖𨽻尊禰引癹吒半音此真言若誦至一洛叉得大智慧又真言曰曩莫引左𨽻祖𨽻尊禰引曩莫此真言常持能除一切塵垢其𤚥字是妙吉祥菩薩根本昧字是慈氏菩薩根本室哩字為如來根本暗字為普賢菩薩根本惡字為虛空藏菩薩根本阿字為一切如來根本阿字又為觀自在菩薩根本又為金剛手菩薩根本吽字為焰鬘得迦忿怒明王根本今略出其印相先正足立後却作右旋轉以二手各作拳舒中指作動搖相此名惹嚩曩印若行人於大難中或被禁縛時用彼一切事無能為害又以右手作拳直豎中指此名幢印若鬬戰時或有大怖時用又先作跏趺坐以左手作拳直豎拇指以右手執左手拇指安於臍輪此名法印求解脫用一切天人皆悉稱讚又以二手展舒手指各相離於頭上旋轉如輪相此印名八輻輪威力能斷除一切大惡又先正立作右舞勢右轉以右手作施願左手作三旛相安額上復作右舞勢復作左舞勢此名方位印能伏師子龍虎及部多必舍左鬼等乃至賊盜等又以二手各安臂上各豎頭指此名鉢哩伽印能除一切瘧病又以二手作拳相合以拇指相交此名搗杵印當用息除大惡宿曜又以右手拇指與小指安於頭指頭此名鉢致娑印能降伏阿蘇羅又以二手合掌二拇指如針此名說法印於供養本尊時用當得諸佛菩薩及天龍八部諸持明天尊皆悉歡喜能施成就已上諸印皆誦本部真言如欲成就大事速求靈騐者必須依經立壇作法方獲果遂修悲敬二田初修敬田行者欲得定慧增長福智圓明必須廣修悲敬二田上供十方三寶下濟六道四生以此為定慧之基菩提之本故云菩提心有二種度無邊眾生為因無上菩提為果曼茶羅疏云夫為道者上若不供諸佛菩薩何處展智欲求菩提下若不濟諸仙餓鬼何處行悲行者如欲修敬當依本經結五供養印誦根本真言運想供養本尊諸佛菩薩一切聖眾成就所願福智圓滿如或常須供養不能依經作法今準諸部陀羅尼并成佛心要略而出之先當於聖像前一心恭敬五體投地遍禮十方法界無盡佛法僧三寶如五字陀羅尼頌令結金剛印以兩手各相背二小指二拇指相鈎口誦真言七遍真言曰唵引嚩日囉二合勿微吉切亦作吠誦已以印頂上散之由此真言印不思議力自然遍法界無盡三寶前皆有自身禮拜奉事然後以飲食香華等隨力所辦盛於淨器結普通吉祥印印之以右手拇指與無名指相捻餘三指舒散誦淨法界真言加持二十一遍真言曰㘕由此真言加持及手印力其飲食器物等自然清淨遍於法界蓮華部念誦法云於一切供養香華等皆加持此㘕字放白色光即無穢觸所供養物皆遍法界次誦無量威德自在光明勝妙力變食真言合掌加持二十一遍真言曰娜謨薩嚩無可切下同怛他引去聲㜸跢引一嚩路引枳帝二唵引三三去聲䟦囉三䟦囉吽引四由此真言加持力故其飲食等即變成諸天種種餚饍上味奉獻供養十方無盡三寶亦為讚歎勸請隨喜功德復結出生供養印二手外相叉合掌十指各兩節相交安在頂上誦出生供養真言二十一遍真言曰唵由此真言及印不思議力自然遍法界出生無盡香華燈燭幢旛寶葢衣服臥具樓閣音樂等種種供具供養遍法界無量三寶等若無飲食香華等但於佛前運想結印誦呪亦自然出生如上種種供具供養法界三寶此變食真言理趣功德如下廣明次修悲田欲施諸仙食者以一淨器盛滿飲食誦變食真言二七遍投於淨流水中即變成天仙美妙之食供養百千俱胝恒河沙數諸仙彼諸仙等得加持食各各成就根本所願諸善功德若人以此真言加持飲食施諸仙眾能令現世增長福壽心所見聞正解清淨具足成就梵天威德一切冤讐不能侵害欲濟諸餓鬼者每於晨朝及一切時悉無障礙取一淨器盛少淨水置於少飯及諸餅食以左手持器右手作寶印以大拇指頭指中指小指舒以無名指用攪食上施諸仙食亦作此印誦變食真言七遍加持已然後稱四如來名號南無多寶如來能破餓鬼慳恡業得福德圓滿南無妙色身如來能除餓鬼醜陋形得色相具足南無廣博身如來能令餓鬼喉咽寬大所施之食悉皆充足南無離怖畏如來能除餓鬼一切怖畏得離鬼道稱如來名號已彈指七遍取其食器於淨地上展右臂瀉之淨石木上瓦器亦得佛言加持此陀羅尼七遍能令一食變成種種甘露飲食充足百千俱胝那由他恒河沙數一切餓鬼及異類鬼神皆得飽滿如是等眾一一各得摩伽陀國七七斛食此食此水量同法界食之無盡皆獲聖果解脫苦身得生天上及生淨土其能施者便能具足無量福德則同供養百千俱胝如來功德等無差別當知此無量威德自在光明勝妙力變食陀羅尼即是三德秘藏此之秘藏具一切法故能流出無窮出生無量周徧法界普興供養三德者法身般若解脫各具常樂我淨四德法身不獨法身必具般若解脫般若解脫互具亦爾言威德自在者即解脫德也光明者般若德也勝妙者法身德也力者三德之力也梵語陀羅尼此云總持謂總持三德要在一心一心三德法爾而具然則一心即陀羅尼陀羅尼即是法食莫不以三德共為之體亦莫不以三德共為之用圓教之人由能了知三德秘藏具一切法一切諸法體是三德故能舉體起用作此現前所施分段之食於一一食出生一切天須陀甘露味及歡喜丸酥酪醍醐一切美味莫不悉具於此一一味中亦復出生妙香寶華天衣瓔珞眾寶輦輿一切服用鐘磬金鐃笙簫角貝樂絃歌一切妙音流泉浴池華果園林光明臺殿一切住處復於一一美味一一服用一一妙音一一住處彼彼出生如上六塵一切妙供無不周徧一器之食至微至約而所以能有如是不思議用者以此一即三德之全體故也我今持此三德所熏六塵妙供普施法界無量群生一時充足無所乏少雖施之物亦本無有我及眾生亦無有相是為以空為觀者雖復無與無取無物無我無眾生而其施者受者及中間物莫不宛然歷歷可見是為以假為觀者於一心中了知施者受者及所施物非有非無三輪俱絕是為以中為觀者三觀照一念中得無後無前何思何慮作如是觀而行施是為不住相施是諸眾生受此施時一一自然皆得禪悅法喜之食以故居天道則轉增勝福在人倫則頓悟真歸修羅調伏瞋心餓鬼咸獲飽滿畜生自得智慧地獄永脫拘囚即於此時咸悔業因進求出世應知是法是食俱得為利譬如熏藥藥隨火勢入人身中患除方復法隨食入亦復如是或近或遠終破無明若取水一掬用甘露真言加持七遍散於空中其水一滴即皆變成十斛甘露一切餓鬼並得飲之無有乏少皆得飽足真言曰南無素嚕皤耶怛多揭他耶怛姪他唵素嚕素嚕皤囉素嚕皤囉素嚕莎嚩二合訶設無飲食即以甘露真言加持水施之令一切餓鬼皆悉飽滿若有四輩弟子以此真言及四如來名號加持飲食施諸餓鬼便能具足無量功德壽命延長福德增榮又得顏色鮮潔威德強記速能滿足檀波羅蜜一切夜叉羅剎諸惡鬼神人非人等皆畏是人不敢侵害智矩如來心破地獄真言別行經云此呪若誦一遍無間地獄碎如微塵於中受苦眾生悉生極樂若梵書此呪於鐘皷鈴鐸作聲木上等有諸眾生得聞聲者所有十惡五逆等罪悉皆消滅不墮惡趣之中真言曰曩謨阿灑吒二合悉底引喃引三摩也二合三母䭾故緻引喃引唵艮齧二合曩引嚩婆引悉蹄哩提哩吽以梵漢字兼書之於鐘皷等上更妙毗盧遮那佛大灌頂光真言不空羂神變經云若諸眾生具造十惡五逆四重之罪數如微塵滿斯世界身壞命終墮諸惡道以此真言加持土沙一百八遍散亡者屍骸上或散塚墓上彼所亡者若在地獄餓鬼修羅傍生等中以此真言加持力故應時即得光明及身除諸罪報捨所苦身往於西方極樂國土蓮華化生直至成佛更不墮落真言曰唵喉中擡聲引呼一阿謨引伽上聲尾嚧左曩二摩賀引母捺囉二合麼抳三鉢納麼二合入嚩二合攞四鉢囉二合靺哆野靺亦作韈吽引五合口呼胸喉中聲如牛吼尾亦作吠廢微左亦作遮者母亦作畆抳亦作儗阿字去聲呼阿謨伽此云無間斷古云不空者謬也尾嚧左曩亦作吠嚧遮娜或用紙帛等書此真言置亡人身上或骨上亦妙故偈云真言梵字觸屍骨亡者得生淨土中見佛聞法親授記速證無上大菩提不空羂索經云若聞此呪二三七遍經耳根者即得除滅一切罪障若有眾生連年累月痿黃疾惱苦楚萬端是病人者先世業報以是真言於病者前一二三日每日高聲誦此真言一千八十遍則得除滅宿業病障若為鬼嬈魂識悶亂失音不語持真言者加持手一百八遍摩捫頭面以手按於心上額上加持一千八十遍則得除瘥若諸鬼神魍魎之病加持五色線索一百八結繫病者腰臂項上及加持衣則便除瘥矣觀自在菩薩甘露真言觀自在菩薩陀羅尼經云若人誦此呪者所有過去現在四重五逆謗方等經一闡提罪悉皆消滅無有遺餘身心輕利智慧明達若身若語悉能利樂一切有情若有眾生廣造一切無間等罪若得遇此持呪人影暫映其身忽得共語或聞語聲彼人罪障悉皆消滅又若欲利益一切有情者每至天降雨時起大悲心仰面向空誦此真言二十一遍其雨滴所霑一切有情盡滅一切惡業重罪皆獲利樂真言曰曩謨囉怛曩二合怛囉二合夜引野曩謨阿引去哩也二合嚩路枳帝濕嚩二合囉平引野冐地薩怛嚩二合野摩賀引薩怛嚩二合野摩訶迦引嚕抳迦野怛你也二合他引唵引度𩕳度𩕳迦度𩕳娑嚩二合賀引迦或作葛抳或作禰𩕳或作你若樂略者但唵字以下持之唵字已上是歸敬辭又怛你也他已上之文或不慣誦可依大悲呪曩謨字誦起至迦盧尼迦耶向下如本真言誦之若書此真言於鐘皷鐸等一切出聲物上或有撞擊吹振出聲一切眾生聞此聲者悉皆清淨命終得生西方淨土六字大明真言唵引麼抳鉢訥銘二合引吽引莊嚴寶王經云時觀自在菩薩說此大明時四大部州并諸天宮悉皆震搖四大海水波浪騰湧一切諸魔作障者悉皆怖散馳走佛告除蓋障菩薩言此六字大明陀羅尼難得值遇若有得此六字大明王者是人貪瞋癡毒不能染污若戴持在身中者是人亦不染著三毒病此真言無量相應如來而尚難知菩薩云何而得知此觀自在菩薩微妙本心處耶若人能常受持此大明者於持誦時有九十九殑伽河沙數如來集會復有微塵數菩薩集會復有無數天龍八部而來衛護是人此持誦人七代種族皆當得其解脫腹中所有諸蟲當得不退轉菩薩之位若身中頂上戴持有人得見是戴持人則同見於金剛之身乃至見於如來若能依法念誦即得無盡辨才日日具六波羅蜜圓滿功德若口中所出之氣觸他人身彼人發起慈心離諸瞋毒當得不退轉菩薩疾證無上菩提此戴持之人以手觸人或以眼見乃至異類諸有情等悉皆速得菩薩之位如是之人永不受生老病死諸苦又佛言所有微塵我能數其數量乃至大海水我能知其數量若有念六字大明一遍所獲功德而我不能數其數量假如四大部洲一切男女皆得七地菩薩之位所有功德與念六字大明一遍功德而無有異若人書寫此大明者同寫八萬四千法藏若以天金寶造作如來形像如微塵數不如書寫此六字大明中一字所獲果報功德不可思議是人當得一百八三摩地門但念一遍當得一切如來以衣服飲食湯藥及座臥等資具一切供養此法於大乘中最上精純微妙一切如來及諸菩薩而皆恭敬合掌作禮說此六字真言時有七十七俱胝如來皆來集會同說七俱胝準提陀羅尼是知此六字真言與準提真言首尾相須如欲與準提真言同誦者可於準提真言前念誦然須要得其訥銘二字合為一字始符梵音不謬或欲單持誦者功德準如上說若欲如法結壇念誦詳彼經文此不繁錄文殊菩薩五字心呪阿囉跛者娜梵書金剛頂經五字真言勝相云若人纔誦一遍如誦八萬四千十二圍陀藏經若誦兩遍文殊普賢隨逐加被護法善神在其人前又若誦一遍能除行人一切苦難若誦兩遍除滅億劫生死重罪若誦三遍三昧現前若誦四遍總持不忘若誦五遍速成無上菩提若人一心獨處閑靜梵書五字輪壇依法念誦滿一月已文殊菩薩即現其身或於空中演說法要是時行者得宿命智辯才無礙神足自在勝願成就福智具足速能皆證如來法身但心信受經十六生決定成正覺欲作法加持結界詳如五字心陀羅尼品大寶廣博樓閣善住秘密陀羅尼曩謨薩嚩怛他引孽多去聲喃引一唵二尾補攞孽陛三亦作毗布羅揭陛尾又作肥陛亦作鞞麼抳鉢囉二合陛四抳亦作尼去聲囉亦作臘怛他多五他上聲多去聲你捺捨寧六亦作那捺你捨泥又作達囉設你麼抳麼抳七抳亦作尼上聲蘇上聲鉢囉二合陛八蘇亦作素囉亦作臘尾麼黎九亦作肥摩麗又作毗末梨娑引孽囉十孽亦作竭儼鼻十一亦作鉗鼻囇又作鉗苾𠼝吽十二吽十三入嚩二合攞入嚩二合攞十四亦作什皤羅又作什伐囉沒䭾尾盧枳帝十五亦作勃陀嚩𡀔枳羝又作勃陀毗路吉帝麌呬作二合地瑟恥二合多上聲孽陛十六麌呬夜亦作矩醯耶娑嚩二合訶引十七下是梵書舊本多訛今校正若欲書於物上須華梵兩存然書華文不必書其句下別譯之文引引一二三四五六七八九引十十一十二十三十四十五十六十七心呪唵一麼抳嚩日囉二合二吽三一二三隨心呪唵一麼抳尾軫切駄上聲哩二合二吽三泮吒半音四一二三四此呪前後三譯初譯失譯人名開元附梁錄次菩提流志譯三不空三藏譯今恐初學苦於梵音乃校其三譯正錄不空所譯之文以餘二譯字有不同者贅於句下俾習者宛得其音而無疑滯焉經云此陀羅尼有大威德佛由此成道由此降魔能滅惡障能成六度若書於幢上殿上氎紙上墻板等上有諸眾生暫得見者或身手觸者或影中過者及於人轉觸此人者或佩身或頂戴或書於有聲物上其聞聲者或讀誦者或有但聞此陀羅尼名者如是眾生等縱有四重五逆十惡等罪悉皆消滅決定當得無上菩提能於現世獲無量百千功德常得國王宰官四眾喜敬不受世間種種諸苦毒藥刀杖水火等難一切師子虎狼諸惡禽獸不敢為害又無一切盜賊鬼神邪魅諸毒蛇難又現身不受一切諸病所謂一切瘧病眼病耳病鼻病舌病齒病脣病喉病頭病項病諸支分病手病背病腰病臍病痔病淋病痢病瘻病瘡病髀病脚病疔病斑病肚病疥病疱病癩病癬病如是等病悉不著身不為厭禱蠱毒呪詛著身無橫災死臥安覺安於其夢中見百千佛剎及見諸佛并諸菩薩圍繞臨命終時心不散亂一切諸佛現前安慰又一切傍生鹿鳥蚊蝱飛蛾螻蟻乃至胎卵濕化諸有情等聞此陀羅尼名者或身觸者或影中過者決定當得無上菩提又人於高山頂上誦此陀羅尼者盡眼所見處一切眾生皆得滅除一切罪業廣如經說功德寶山陀羅尼南無佛陀引耶南無達磨引耶南無僧伽引耶唵悉帝護嚕嚕悉都嚕只利波二合吉利婆二合悉達哩布嚕哩娑嚩二合引訶引護亦作胡都亦作度只亦作遮波亦作婆哩亦作尼去聲大集經云若人誦此呪一遍如禮大佛名經四萬五千四百遍又如轉大藏六十萬五千四百遍造罪過十剎土入阿鼻大地獄受罪劫盡更生念此呪一遍其罪皆得消滅不入地獄命終決定往生西方世界得見阿彌陀佛上品上生造罪過十剎土者謂造罪過於十世界微塵也劫盡更生者謂此娑婆世界壞時其罪未畢即寄往他方世界地獄中此界成已復移其人迴此方地獄中受苦也三字總持真言唵啞吽啞亦作阿此是梵書唵啞吽字瑜伽大教王經云唵字是大遍照如來即毗盧遮那佛啞字是無量壽如來即阿彌陀佛吽字是阿閦如來即不動佛如來因住多年修道不得菩提後習此觀於初夜分便成正覺謂唵字具含無量法門是一切真言之母一切如來皆因觀想此字而得成佛阿字是毗盧佛身亦是法界亦是菩提心若人想念能生無量功德吽字總攝金剛部一切真言是金剛部主身亦是三解脫門若常想念能除一切罪障成就一切功德諸教決定名義論云吽字即法身阿字即報身唵字即化身如是三字攝此三身彼分別說三乘解脫道是為正說因所有聲聞緣覺及一切智智由是出現說一切法即彼三字亦是金剛三業如實安住所謂唵引阿引吽引此中唵字是名金剛身業阿引字金剛語業吽字金剛心業又復吽字而為心智覺了一切法如上所說一切文字當知皆從盎阿引吽三字所生由是諸法起種種相今當分別彼一切法皆與盎阿引二字初後相攝此中吽字出生一切於三界中出現眾色所有天人龍阿修羅迦樓羅緊那羅乾闥婆成就持明天吉祥天辯才天烏摩天帝釋天梵王天那羅延天大自在天如是等天及天后所有一切有情界中男子女人乃至諸佛菩薩等皆從此吽字出生變化彼一一心住此字相若心想此字時當住虗空出生無礙所謂三界心同此一心入入是心已此得名為現證菩提當知此心無等無取無著無住無表無相是即虗空平等一切智無所得相應無自無他相應正行世間所有旃陀羅等最下族類彼等諸行乃至傍生等類彼所行行種種差別如是諸行雖復差別皆亦不離一切智智相應正行云云成佛儀軌頌云由誦此唵字加持威力故縱觀想不成於諸佛海會諸供養雲海真實具成就由諸佛誠諦法爾所成故由適誦啞字摧滅諸罪障獲諸悅意樂等同一切佛超勝眾魔羅不能為障礙應受諸世間廣大諸供養由吽字加持虎狼諸毒蟲惡心人非人盡無能陵屈如來初成道於菩提樹下以此印密言摧壞天魔眾大佛頂陀羅尼經言設有眾生於散亂心口持神呪尚有八萬四千那由他恒河沙俱胝金剛藏王菩薩種族一一皆有諸金剛眾而為眷屬晝夜常隨侍護此人縱令魔王求其方便終不可得諸山鬼神去此善人十由旬外若魔眷屬欲來侵擾是善人者諸金剛眾而以寶杵殞碎其首猶如微塵恒令此人所作如願已上修持悲敬諸真言等若不能各各誦持書寫者一切所作悉用準提真言亦得以準提真言似如意珠若持誦行人處處用之皆得成就也上言誦持真言能滅五逆十惡四重罪者須知罪有性遮懺具事理性則無論受戒與不受戒作便是罪遮謂曾受佛戒故心毀犯事須披陳發露禮佛名經行方等儀能伏業本理謂專觀實相達罪性空滅業根源此諸真言神呪若能依法誦持即事理雙運業本罪源並消若犯禁戒準律說悔加以神呪則事理兼備性遮齊遣不可纔聞神呪功力便乃違犯禁戒不依律懺遮罪猶存或托真言儀軌數造眾過譬如愚人恃王勢力廣作諸惡禍終滅頂業心不斷罪實難除必使身心俱捐方得罪滅如日消霜矣數珠功德法夫數珠者記心之奇術積功之初基持之者成德戴之者滅垢世出世果莫不由斯如金剛頂瑜伽念珠經云爾時毗盧遮那世尊告金剛手言善哉善哉為諸修真言行菩薩者說諸儀軌哀愍未來諸有情等說念珠功德勝利由聞如是妙意趣故速證悉地時金剛薩埵菩薩白佛言唯然世尊我今為說之爾時金剛薩埵菩薩而說偈言珠表菩提之勝果於中間絕為斷漏繩線貫串表觀音母珠以表無量壽慎莫驀過越法罪皆由念珠積功德硨磲念珠一倍福木槵念珠兩倍福以鐵為珠三倍福熟銅作珠四倍福水精真珠及諸寶此等念珠百倍福千倍功德帝釋子金剛子珠俱胝福蓮子念珠千俱胝菩提子珠無數福佛部念珠菩提子金剛部法金剛子寶部念誦以諸寶蓮華部珠用蓮子羯磨部中為念珠眾珠間雜應貫串念珠分別有四種上品最勝及中下一千八十以為上一百八珠為最勝五十四珠以為中二十七珠為下類二手持珠當心上靜慮離念心專注本尊瑜伽心一境皆得成就事理法設安頂髻及掛身或安頸上及安臂所說言論成念誦以此念誦淨三業由安頂髻淨無間由帶頸上淨四重手持臂上除眾罪能令行者速清淨若修真言陀羅尼念諸如來菩薩名當獲無量勝功德所求勝願皆成就三部念誦持數珠手印相今當分別如蘇悉地供養法云以右手大指捻無名指頭直舒中指小指微屈以頭指著中指上節側此通三部執數珠印其蓮華部執珠印以右手大指捻中指頭餘三指直舒左手亦然其金剛部執珠印以右手作拳展直大指捻頭指左手亦然持明藏儀軌經云用童女合線以二十一合成條穿珠或持誦時以大拇指掐一珠一誦真言音釋郝音壑𭘻音諍張開畵繒也縠音斛紡絲織之細如霧一名方空言其紗薄如空也那由他此云萬億拔折羅此云金剛即金剛杵棓同棒部多鬼也淨居天子色界第四禪共有九天上五天名五淨居天也瘻音閭痀瘻曲脊病必舍左此云啖精氣謂噉人及五穀之精氣殑伽河舊云恒河三障一煩惱障二業障三報障五悔法一禮佛二懺悔三隨喜四勸請五發願餘經或不以禮佛為五以迴向足五元迴向即兼發願若本經初入道場時令發願持誦畢乃兼迴向意謂以現所修真言功德迴向三處也或有以隨喜在勸請後謂先懺滌身器次欣法雨後攝他同己迴向三處若勸請在隨喜後以隨喜是懺悔中別義事勢相連故先明之平等廣大方堪聞法也大金光明經云有四種重業難可滅除一者於諸菩薩律儀犯極重罪二者於大乘經心生誹謗三者於自善根不能增長四者貪著三有無出離心有四對治能滅四罪一者於十方佛至心親近說一切罪二者為一切眾生勸請諸佛說深妙法三者隨喜一切眾生所有功德四者所有善根悉皆迴向無上菩提如是隨喜當德無量功德之聚如恒河沙三千大千世界眾生皆成阿羅漢有人盡其形壽以上妙四事供養不及隨喜功德十分之一其勸請所得功德假使人以滿恒河沙數大千世界七寶供養一切諸佛所德功德其勸請功德亦勝於彼云云䟦揭切數珠一百八表除一百八煩惱謂九十八使更加十纏是也儗偶起切音擬有清信士問曰準提有懺法否答曰經云每入道場先應禮佛懺悔隨喜勸請發願此之五悔即是懺法無別有以為懺也問曰近見有云夢授懺儀或云鏡中所現復圖諸形像今某甲未辯邪正特請師決答曰若不與本經文合皆是魔事或持呪行人不善作法魔現佛像菩薩像種種異相令行人生喜生怖皆不足信倘行人遇斯境者觀其所現不合經文即當以無能勝呪印辟除之魔遂不得便問曰鏡上可用梵書九字否答曰行者不能如法結壇故以鏡為壇元梵書只宜想布於心月輪中奚用書於鏡為問曰世云五月初十日復云某月日是準提菩薩誕晨果否答曰準提乃法身菩薩既不降生人間何有誕耶
